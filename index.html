<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PaddockPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #1A1008;
      --card:   #251508;
      --card2:  #2E1A0A;
      --border: #3D2210;
      --wheat:  #D4A843;
      --wheat2: #B88A30;
      --fg:     #F2E4C4;
      --muted:  #7A6248;
      --green:  #4E9A5A;
      --red:    #C0392B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--wheat);
      letter-spacing: 0.5px;
    }
    .tabs {
      display: flex;
      background: var(--card);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
      border: 1px solid var(--border);
    }
    .tab {
      padding: 7px 18px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.on { background: var(--wheat); color: var(--bg); font-weight: 500; }

    /* ── SCREENS ── */
    .screen { display: none; max-width: 440px; margin: 0 auto; padding: 28px 20px 60px; }
    .screen.on { display: block; }

    /* ── JOSH SCREEN ── */
    .date-block { text-align: center; margin-bottom: 36px; }
    .date-weekday {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .date-full {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      color: var(--fg);
    }

    .day-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 10px;
    }
    .big-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 28px 16px;
      border-radius: 20px;
      border: 2px solid var(--wheat);
      background: transparent;
      color: var(--wheat);
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: all 0.18s;
    }
    .big-btn .btn-icon { font-size: 28px; line-height: 1; }
    .big-btn .btn-label { font-family: 'Playfair Display', serif; font-size: 17px; }
    .big-btn .btn-rate  { font-size: 12px; color: var(--muted); }
    .big-btn:hover:not(:disabled) {
      background: var(--wheat);
      color: var(--bg);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212,168,67,0.2);
    }
    .big-btn:hover:not(:disabled) .btn-rate { color: var(--bg); opacity: 0.7; }
    .big-btn:active:not(:disabled) { transform: translateY(0); }
    .big-btn.done {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      cursor: default;
    }
    .big-btn.done .btn-rate { color: rgba(255,255,255,0.7); }
    .big-btn.done:hover { transform: none; box-shadow: none; }

    .logged-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      border-radius: 20px;
      background: var(--green);
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      margin-bottom: 8px;
    }
    .undo-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      margin-bottom: 28px;
      transition: color 0.15s;
    }
    .undo-btn:hover { color: var(--red); }

    .sec-label {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .day-list { display: flex; flex-direction: column; gap: 6px; }
    .day-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--wheat);
      opacity: 0.7;
      flex-shrink: 0;
    }
    .day-row span { font-size: 14px; }

    /* ── PIN SCREEN ── */
    .pin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 20px;
    }
    .pin-icon { font-size: 40px; margin-bottom: 16px; }
    .pin-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .pin-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; text-align: center; }
    .pin-input {
      width: 180px;
      padding: 14px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      text-align: center;
      letter-spacing: 8px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.15s;
      -webkit-text-security: disc;
    }
    .pin-input:focus { border-color: var(--wheat); }
    .pin-input.shake { animation: shake 0.35s ease; border-color: var(--red); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }
    .pin-btn {
      width: 180px;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--wheat);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pin-btn:hover { background: var(--wheat2); }

    /* ── JANINE DASHBOARD ── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .mnav-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .mnav-btn:hover { border-color: var(--wheat); color: var(--wheat); }
    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
    }

    .earn-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .earn-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,168,67,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .earn-lbl {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .earn-amt {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      color: var(--wheat);
      line-height: 1;
      margin-bottom: 8px;
    }
    .earn-detail { font-size: 13px; color: var(--muted); }

    .dl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px;
      border-radius: 13px;
      border: none;
      background: var(--wheat);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 24px;
      transition: background 0.15s, transform 0.1s;
    }
    .dl-btn:hover { background: var(--wheat2); transform: translateY(-1px); }
    .dl-btn:active { transform: translateY(0); }

    /* ── SHARED ── */
    .empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--wheat);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 24px);
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--card2);
      color: var(--fg);
      padding: 12px 22px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── PRINT ── */
    @media print {
      body { background: #fff; color: #111; font-family: Georgia, serif; }
      .hdr, .tabs, .month-nav, .dl-btn, .undo-btn { display: none !important; }
      .screen { padding: 0; max-width: 100%; }
      .earn-card {
        background: #f7f7f7;
        border-color: #ddd;
        break-inside: avoid;
      }
      .earn-card::before { display: none; }
      .earn-amt { color: #333; font-size: 40px; }
      .earn-lbl, .earn-detail { color: #666; }
      .day-row { background: #f7f7f7; border-color: #ddd; break-inside: avoid; }
      .day-row span { color: #111; }
      .dot { background: #555; }
      .sec-label { color: #666; }
      .print-hdr { display: block !important; }
    }
    .print-hdr {
      display: none;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #333;
    }
    .print-hdr h1 { font-size: 26px; margin-bottom: 4px; }
    .print-hdr p  { font-size: 14px; color: #555; }
  </style>
</head>
<body>

<header class="hdr">
  <span class="logo">PaddockPay</span>
  <div class="tabs">
    <button class="tab" id="tab-josh"   onclick="gotoView('josh')">Josh</button>
    <button class="tab" id="tab-janine" onclick="gotoView('janine')">Janine</button>
  </div>
</header>

<!-- ══ JOSH SCREEN ══ -->
<div class="screen" id="screen-josh">
  <div class="date-block">
    <div class="date-weekday" id="j-weekday"></div>
    <div class="date-full"    id="j-date"></div>
  </div>

  <div class="day-btns" id="log-btns">
    <button class="big-btn" id="btn-full" onclick="logToday('full')">
      <span class="btn-icon">☀️</span>
      <span class="btn-label">Full Day</span>
      <span class="btn-rate">$350</span>
    </button>
    <button class="big-btn" id="btn-half" onclick="logToday('half')">
      <span class="btn-icon">⛅</span>
      <span class="btn-label">Half Day</span>
      <span class="btn-rate">$175</span>
    </button>
  </div>
  <div id="logged-state" style="display:none">
    <div class="logged-badge" id="logged-badge"></div>
    <button class="undo-btn" onclick="undoToday()">↩ Undo today's entry</button>
  </div>

  <div class="sec-label">Recent days worked</div>
  <div class="day-list" id="josh-list"><div class="spinner"></div></div>
</div>

<!-- ══ JANINE — PIN GATE ══ -->
<div class="screen" id="screen-pin">
  <div class="pin-wrap">
    <div class="pin-icon">🔐</div>
    <div class="pin-title">Janine's Dashboard</div>
    <p class="pin-sub">Enter your PIN to view statements<br>and earnings history.</p>
    <input type="password" inputmode="numeric" maxlength="6"
           class="pin-input" id="pin-input"
           placeholder="••••"
           onkeydown="if(event.key==='Enter')checkPin()">
    <button class="pin-btn" onclick="checkPin()">Unlock</button>
  </div>
</div>

<!-- ══ JANINE — DASHBOARD ══ -->
<div class="screen" id="screen-janine">

  <!-- Hidden print header -->
  <div class="print-hdr" id="print-hdr">
    <h1>PaddockPay — Work Statement</h1>
    <p id="print-sub"></p>
  </div>

  <div class="month-nav">
    <button class="mnav-btn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="month-lbl"></div>
    <button class="mnav-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>

  <div class="earn-card">
    <div class="earn-lbl" id="earn-lbl">Total earned</div>
    <div class="earn-amt" id="earn-amt">$0</div>
    <div class="earn-detail" id="earn-detail">0 days &times; $350/day</div>
  </div>

  <button class="dl-btn" onclick="printStatement()">
    &#8595;&nbsp; Download / Print Statement
  </button>

  <div class="sec-label">Days worked</div>
  <div class="day-list" id="janine-list"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<script src="supabase.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────
const SUPABASE_URL  = 'https://qfuffybirntwooanvtte.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmdWZmeWJpcm50d29vYW52dHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM5NTEwMDYsImV4cCI6MjA1OTUyNzAwNn0.UeNVJNqjGLDmAR0rnVjBFcmRj8r8rH_eicXz1IIQQ2g';
const DAY_RATE      = 350;
const JANINE_PIN    = '2606';   // ← change this to whatever PIN Janine wants

// ── INIT ──────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

let curMonth = new Date();
curMonth.setDate(1);

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function fmtDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-AU',
    {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}
function fmtMonth(dt) {
  return dt.toLocaleDateString('en-AU', {month:'long', year:'numeric'});
}
function fmtAUD(n) {
  return '$' + n.toLocaleString('en-AU');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── ROUTING ───────────────────────────────────────────────
function gotoView(view) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-' + view).classList.add('on');

  if (view === 'janine') {
    document.getElementById('screen-janine').classList.add('on');
    loadJanine();
  } else {
    document.getElementById('screen-josh').classList.add('on');
    loadJosh();
  }
  history.replaceState(null,'','#/' + view);
}

// ── PIN ───────────────────────────────────────────────────
function checkPin() {
  const val = document.getElementById('pin-input').value;
  if (val === JANINE_PIN) {
    sessionStorage.setItem('pp_auth', '1');
    document.getElementById('pin-input').value = '';
    gotoView('janine');
  } else {
    const inp = document.getElementById('pin-input');
    inp.classList.add('shake');
    inp.value = '';
    setTimeout(() => inp.classList.remove('shake'), 400);
    showToast('Incorrect PIN — try again');
  }
}

// ── JOSH ──────────────────────────────────────────────────
async function loadJosh() {
  const now = new Date();
  document.getElementById('j-weekday').textContent =
    now.toLocaleDateString('en-AU', {weekday:'long'});
  document.getElementById('j-date').textContent =
    now.toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});

  const todayStr = todayISO();

  // Check if logged today
  const { data: todayRow } = await db
    .from('work_logs').select('date, day_type').eq('date', todayStr).maybeSingle();

  const btns   = document.getElementById('log-btns');
  const logged = document.getElementById('logged-state');
  const badge  = document.getElementById('logged-badge');

  if (todayRow) {
    btns.style.display   = 'none';
    logged.style.display = 'block';
    const isFull = todayRow.day_type !== 'half';
    badge.innerHTML = isFull
      ? '☀️ &nbsp;Full day logged'
      : '⛅ &nbsp;Half day logged';
  } else {
    btns.style.display   = 'grid';
    logged.style.display = 'none';
    document.getElementById('btn-full').disabled = false;
    document.getElementById('btn-half').disabled = false;
  }

  // Recent days
  const { data: rows } = await db
    .from('work_logs').select('date, day_type')
    .order('date', {ascending:false}).limit(10);

  const list = document.getElementById('josh-list');
  if (!rows || rows.length === 0) {
    list.innerHTML = '<div class="empty">No days logged yet — tap a button!</div>';
    return;
  }
  list.innerHTML = rows.map(r => {
    const half = r.day_type === 'half';
    return `
    <div class="day-row">
      <div class="dot" style="${half ? 'opacity:0.4' : ''}"></div>
      <span style="flex:1">${fmtDate(r.date)}</span>
      <span style="font-size:11px;color:var(--muted)">${half ? '½ day' : 'full'}</span>
    </div>`;
  }).join('');
}

async function logToday(type) {
  document.getElementById('btn-full').disabled = true;
  document.getElementById('btn-half').disabled = true;

  const { error } = await db.from('work_logs').insert({ date: todayISO(), day_type: type });

  if (error) {
    if (error.code === '23505') {
      showToast('Already logged today!');
    } else {
      showToast('Could not log — check your connection');
      document.getElementById('btn-full').disabled = false;
      document.getElementById('btn-half').disabled = false;
      return;
    }
  } else {
    showToast(type === 'full' ? 'Full day logged ✓' : 'Half day logged ✓');
  }
  loadJosh();
}

async function undoToday() {
  const { error } = await db
    .from('work_logs').delete().eq('date', todayISO());
  if (error) { showToast('Could not undo — try again'); return; }
  showToast('Removed today\'s entry');
  loadJosh();
}

// ── JANINE ────────────────────────────────────────────────
function changeMonth(dir) {
  curMonth.setMonth(curMonth.getMonth() + dir);
  loadJanine();
}

async function loadJanine() {
  const y = curMonth.getFullYear();
  const m = curMonth.getMonth();

  const label = fmtMonth(curMonth);
  document.getElementById('month-lbl').textContent  = label;
  document.getElementById('print-sub').textContent  =
    'Josh Pye  ·  ' + label + '  ·  Rate: $' + DAY_RATE + '/day';

  const start = `${y}-${pad(m+1)}-01`;
  const end   = `${y}-${pad(m+1)}-${pad(new Date(y, m+1, 0).getDate())}`;

  document.getElementById('janine-list').innerHTML = '<div class="spinner"></div>';

  const { data: rows, error } = await db
    .from('work_logs').select('date, day_type')
    .gte('date', start).lte('date', end)
    .order('date', {ascending: true});

  if (error) { showToast('Failed to load data'); return; }

  const fullDays = rows.filter(r => r.day_type !== 'half').length;
  const halfDays = rows.filter(r => r.day_type === 'half').length;
  const dayTotal = fullDays + halfDays * 0.5;
  const earned   = fullDays * DAY_RATE + halfDays * (DAY_RATE / 2);

  const now = new Date();
  const isNow = y === now.getFullYear() && m === now.getMonth();
  document.getElementById('earn-lbl').textContent =
    isNow ? 'Earned so far this month' : 'Total earned this month';
  document.getElementById('earn-amt').textContent = fmtAUD(earned);

  let detail = '';
  if (fullDays > 0 && halfDays > 0)
    detail = `${fullDays} full + ${halfDays} half = ${dayTotal} days × $${DAY_RATE}`;
  else if (halfDays > 0)
    detail = `${halfDays} half day${halfDays !== 1 ? 's' : ''} × $${DAY_RATE / 2}`;
  else
    detail = `${fullDays} day${fullDays !== 1 ? 's' : ''} × $${DAY_RATE}/day`;
  document.getElementById('earn-detail').textContent = detail;

  const list = document.getElementById('janine-list');
  if (rows.length === 0) {
    list.innerHTML = '<div class="empty">No days worked this month.</div>';
    return;
  }
  list.innerHTML = rows.map(r => {
    const half = r.day_type === 'half';
    return `
    <div class="day-row">
      <div class="dot" style="${half ? 'opacity:0.4' : ''}"></div>
      <span style="flex:1">${fmtDate(r.date)}</span>
      <span style="font-size:11px;color:var(--muted);background:var(--card2);padding:3px 8px;border-radius:6px">${half ? '½ day' : 'full day'}</span>
    </div>`;
  }).join('');
}

function printStatement() {
  window.print();
}

// ── START ─────────────────────────────────────────────────
const startHash = window.location.hash;
if (startHash.includes('janine')) gotoView('janine');
else gotoView('josh');
