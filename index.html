<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#D4A843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PaddockPay">
  <title>PaddockPay</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ===== DESIGN SYSTEM ===== */
    :root {
      --bg:      #1A1008;
      --surface: #2C1A0E;
      --border:  #4A3020;
      --text:    #F2E4C4;
      --muted:   #8A7060;
      --wheat:   #D4A843;
      --green:   #4A7C59;
      --orange:  #D4823A;
      --red:     #8B3A2A;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    a { color: var(--wheat); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== LAYOUT ===== */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    .page { flex: 1; padding: 24px 20px; max-width: 640px; margin: 0 auto; width: 100%; }
    .page-wide { flex: 1; padding: 24px 20px; max-width: 960px; margin: 0 auto; width: 100%; }

    /* ===== COMPONENTS ===== */

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--wheat); color: #1A1008; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--wheat); color: var(--wheat); }
    .btn-danger { background: var(--red); color: var(--text); }
    .btn-danger:hover { opacity: 0.85; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 8px 14px; font-size: 13px; }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-trial { background: rgba(212,168,67,0.2); color: var(--wheat); border: 1px solid rgba(212,168,67,0.4); }
    .badge-active { background: rgba(74,124,89,0.2); color: #6BCB8B; border: 1px solid rgba(74,124,89,0.4); }
    .badge-expired { background: rgba(139,58,42,0.2); color: #E07060; border: 1px solid rgba(139,58,42,0.4); }
    .badge-pending { background: rgba(212,130,58,0.2); color: var(--orange); border: 1px solid rgba(212,130,58,0.4); }
    .badge-paid { background: rgba(74,124,89,0.2); color: #6BCB8B; border: 1px solid rgba(74,124,89,0.4); }
    .badge-draft { background: rgba(138,112,96,0.2); color: var(--muted); border: 1px solid rgba(138,112,96,0.3); }
    .badge-sent { background: rgba(74,124,89,0.2); color: #6BCB8B; border: 1px solid rgba(74,124,89,0.4); }
    .badge-offline { background: rgba(138,112,96,0.2); color: var(--muted); border: 1px solid rgba(138,112,96,0.3); }
    .badge-void { background: rgba(139,58,42,0.15); color: var(--muted); border: 1px solid rgba(139,58,42,0.3); }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus { outline: none; border-color: var(--wheat); }
    .form-input::placeholder { color: var(--muted); }
    .form-input.error { border-color: var(--red); }

    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 44px; }
    .input-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    .form-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .form-error { font-size: 12px; color: #E07060; margin-top: 4px; }

    /* Password strength */
    .pw-strength { margin-top: 6px; }
    .pw-strength-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .pw-strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    .pw-strength-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* Checkbox / Radio */
    .radio-group { display: flex; flex-direction: column; gap: 10px; }
    .radio-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .radio-option:hover { border-color: var(--wheat); }
    .radio-option.selected { border-color: var(--wheat); background: rgba(212,168,67,0.06); }
    .radio-option input { accent-color: var(--wheat); margin-top: 2px; flex-shrink: 0; }
    .radio-label { font-size: 14px; }
    .radio-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .checkbox-wrap {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }
    .checkbox-wrap input[type=checkbox] { accent-color: var(--wheat); margin-top: 2px; flex-shrink: 0; }
    .checkbox-label { font-size: 13px; color: var(--muted); }

    /* Toggle */
    .toggle-wrap { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .toggle-label-group { flex: 1; }
    .toggle-label { font-size: 14px; }
    .toggle-desc { font-size: 12px; color: var(--muted); }
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 13px;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      bottom: 3px;
      background: var(--text);
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--wheat); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Header / Nav */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--wheat);
      text-decoration: none;
    }
    .app-logo:hover { text-decoration: none; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    /* Sync pill */
    .sync-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .sync-pill-dot { width: 6px; height: 6px; border-radius: 50%; }
    .sync-synced { background: rgba(74,124,89,0.2); color: #6BCB8B; }
    .sync-synced .sync-pill-dot { background: #6BCB8B; }
    .sync-syncing { background: rgba(212,168,67,0.2); color: var(--wheat); }
    .sync-syncing .sync-pill-dot { background: var(--wheat); animation: pulse 1s infinite; }
    .sync-offline { background: rgba(138,112,96,0.2); color: var(--muted); }
    .sync-offline .sync-pill-dot { background: var(--muted); }
    .sync-pending { background: rgba(212,130,58,0.2); color: var(--orange); }
    .sync-pending .sync-pill-dot { background: var(--orange); }
    .sync-error { background: rgba(139,58,42,0.2); color: #E07060; cursor: pointer; }
    .sync-error .sync-pill-dot { background: #E07060; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Bottom Sheet */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sheet-backdrop.visible { opacity: 1; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .sheet.visible { transform: translateY(0); }
    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .sheet-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 20px; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      max-width: 320px;
      text-align: center;
      animation: toast-in 0.25s ease, toast-out 0.25s ease forwards;
      pointer-events: all;
      white-space: nowrap;
    }
    .toast-success { background: rgba(74,124,89,0.95); color: #fff; border: 1px solid rgba(74,124,89,0.6); }
    .toast-error { background: rgba(139,58,42,0.95); color: #fff; border: 1px solid rgba(139,58,42,0.6); }
    .toast-warning { background: rgba(212,130,58,0.95); color: #fff; border: 1px solid rgba(212,130,58,0.6); }
    .toast-info { background: rgba(212,168,67,0.15); color: var(--wheat); border: 1px solid rgba(212,168,67,0.4); }

    @keyframes toast-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toast-out { from{opacity:1} to{opacity:0} }

    /* Spinner */
    .spinner {
      display: inline-block;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner-sm { width: 16px; height: 16px; }
    .spinner-md { width: 24px; height: 24px; }
    .spinner-lg { width: 40px; height: 40px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; margin-bottom: 20px; }

    /* Avatar */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      color: #1A1008;
    }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* Banner */
    .banner {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .banner-trial { background: rgba(212,168,67,0.12); border: 1px solid rgba(212,168,67,0.3); color: var(--wheat); }
    .banner-error { background: rgba(139,58,42,0.15); border: 1px solid rgba(139,58,42,0.4); color: #E07060; }
    .banner-info { background: rgba(74,124,89,0.1); border: 1px solid rgba(74,124,89,0.3); color: #6BCB8B; }
    .banner-link { color: inherit; text-decoration: underline; cursor: pointer; flex-shrink: 0; }

    /* Calendar */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-header-cell {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.1s;
      min-height: 44px;
    }
    .cal-day.empty { cursor: default; }
    .cal-day.future { opacity: 0.35; cursor: not-allowed; }
    .cal-day.today { border: 2px solid var(--wheat); }
    .cal-day.full { background: rgba(74,124,89,0.35); color: #6BCB8B; font-weight: 600; }
    .cal-day.half { background: rgba(212,130,58,0.35); color: var(--orange); font-weight: 600; }
    .cal-day:not(.empty):not(.future):hover { background: rgba(212,168,67,0.1); }
    .cal-day.full:hover, .cal-day.half:hover { filter: brightness(1.1); }
    .cal-day-note {
      position: absolute;
      bottom: 2px;
      right: 3px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--wheat);
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      padding: 8px 14px;
      font-size: 16px;
      transition: border-color 0.15s;
    }
    .cal-nav-btn:hover { border-color: var(--wheat); }
    .cal-month-label { font-family: 'Playfair Display', serif; font-size: 20px; }

    .cal-summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .cal-summary-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      text-align: center;
    }
    .cal-summary-num { font-size: 22px; font-weight: 600; color: var(--wheat); }
    .cal-summary-label { font-size: 11px; color: var(--muted); }

    /* Day picker targets */
    .day-type-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .day-type-btn {
      padding: 16px 8px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Mono', monospace;
    }
    .day-type-btn:hover { border-color: var(--wheat); }
    .day-type-btn.selected-full { border-color: var(--green); background: rgba(74,124,89,0.2); }
    .day-type-btn.selected-half { border-color: var(--orange); background: rgba(212,130,58,0.2); }
    .day-type-btn.selected-clear { border-color: var(--red); background: rgba(139,58,42,0.2); }
    .day-type-label { font-size: 13px; font-weight: 600; }
    .day-type-amount { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Tab nav */
    .tab-nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 10px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab-btn.active { color: var(--wheat); border-bottom-color: var(--wheat); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* Onboarding progress */
    .progress-steps {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .progress-step {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .progress-step.done { background: var(--wheat); }
    .progress-step.active { background: rgba(212,168,67,0.5); }

    .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

    /* Landing */
    .hero {
      text-align: center;
      padding: 80px 20px 60px;
    }
    .hero h1 { font-size: clamp(32px, 6vw, 52px); line-height: 1.2; margin-bottom: 16px; }
    .hero p { font-size: 16px; color: var(--muted); max-width: 480px; margin: 0 auto 32px; }
    .hero-cta { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 60px;
    }
    .feature-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .feature-icon { font-size: 28px; margin-bottom: 10px; }
    .feature-title { font-family: 'Playfair Display', serif; font-size: 17px; margin-bottom: 6px; }
    .feature-desc { font-size: 13px; color: var(--muted); }

    .pricing-section { text-align: center; padding: 40px 0; }
    .pricing-toggle { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; font-size: 14px; }
    .pricing-card {
      background: var(--surface);
      border: 2px solid var(--wheat);
      border-radius: 12px;
      padding: 32px;
      max-width: 360px;
      margin: 0 auto;
    }
    .pricing-plan { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .pricing-price { font-family: 'Playfair Display', serif; font-size: 36px; margin-bottom: 4px; }
    .pricing-features { list-style: none; text-align: left; margin: 20px 0; }
    .pricing-features li { padding: 6px 0; font-size: 14px; }
    .pricing-features li::before { content: '✓ '; color: var(--green); }

    /* Worker card */
    .worker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .worker-card-info { flex: 1; min-width: 0; }
    .worker-name { font-weight: 600; font-size: 15px; }
    .worker-stats { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .worker-amount { font-size: 15px; color: var(--wheat); margin-top: 2px; }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 12px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);

<script>
// ===== SUPABASE CLIENT =====
const SUPABASE_URL = 'https://qfuffybirntwooanvtte.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmdWZmeWJpcm50d29vYW52dHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTA1ODYsImV4cCI6MjA5MTE4NjU4Nn0.rq16AX7yjAELec3zgqekOP-LEow2luUV_-oTC5OTNks';

let currentUser = null;

let pendingCount = 0;

// ===== INDEXEDDB OFFLINE QUEUE =====
const DB_NAME = 'paddockpay_offline';
const STORE_NAME = 'sync_queue';
let idb = null;

function openIDB() {
  return new Promise((resolve, reject) => {
    if (idb) { resolve(idb); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { idb = req.result; resolve(idb); };
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
      }
    };
  });
}

async function queueOfflineAction(action, table, payload) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const item = { action, table, payload, created_at: new Date().toISOString(), retry_count: 0 };
    const req = store.add(item);
    req.onsuccess = () => { resolve(req.result); updatePendingCount(); };
    req.onerror = () => reject(req.error);
  });
}

async function getQueueItems() {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function removeQueueItem(id) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const req = store.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function updateQueueItem(id, updates) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const item = { ...getReq.result, ...updates };
      const putReq = store.put(item);
      putReq.onsuccess = () => resolve();
      putReq.onerror = () => reject(putReq.error);
    };
  });
}

async function updatePendingCount() {
  try {
    const items = await getQueueItems();
    pendingCount = items.length;
    updateSyncUI();
  } catch {}
}

async function flushQueue() {
  if (!navigator.onLine) return;
  const items = await getQueueItems();
  if (items.length === 0) { setSyncStatus('synced'); return; }
  setSyncStatus('syncing');
  let hasError = false;
  for (const item of items) {
    try {
      if (item.action === 'upsert') {
        const { error } = await db.from(item.table).upsert(item.payload);
        if (error) throw error;
      } else if (item.action === 'delete') {
        const { error } = await db.from(item.table).delete().match(item.payload);
        if (error) throw error;
      }
      await removeQueueItem(item.id);
    } catch (err) {
      if (item.retry_count < 10) {
        await updateQueueItem(item.id, { retry_count: item.retry_count + 1 });
      }
      hasError = true;
    }
  }
  await updatePendingCount();
  if (hasError) { setSyncStatus('error'); }
  else { setSyncStatus('synced'); router(); } // refresh UI
}

function setSyncStatus(status) {
  syncStatus = status;
  updateSyncUI();
}

function updateSyncUI() {
  const pill = document.getElementById('sync-pill');
  const label = document.getElementById('sync-label');
  if (!pill || !label) return;
  if (!currentUser) { pill.classList.add('hidden'); return; }
  pill.classList.remove('hidden');
  pill.className = 'sync-pill';
  if (!navigator.onLine) {
    if (pendingCount > 0) {
      pill.classList.add('sync-pending');
      label.textContent = `${pendingCount} pending`;
    } else {
      pill.classList.add('sync-offline');
      label.textContent = 'Offline';
    }
  } else if (status === 'syncing') {
    pill.classList.add('sync-syncing');
    label.textContent = 'Syncing...';
  } else if (syncStatus === 'error') {
    pill.classList.add('sync-error');
    label.textContent = 'Sync error';
    pill.onclick = () => flushQueue();
  } else {
    pill.classList.add('sync-synced');
    label.textContent = 'Synced ✓';
    pill.onclick = null;
  }
}

window.addEventListener('online', () => { updateSyncUI(); flushQueue(); });
window.addEventListener('offline', updateSyncUI);

// ===== UTILITIES =====
function sanitize(str) {
  if (!str) return '';
  return String(str).replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

function formatAUD(amount) {
  return Number(amount).toLocaleString('en-AU', { style: 'currency', currency: 'AUD' });
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function dayKey(date) {
  const d = date instanceof Date ? date : new Date(date);
  return d.toISOString().split('T')[0];
}

function getAEST() {
  // Returns current date in AEST (UTC+10)
  const now = new Date();
  const aest = new Date(now.toLocaleString('en-US', { timeZone: 'Australia/Brisbane' }));
  return aest;
}

function monthLabel(month, year) {
  return new Date(year, month - 1, 1).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
}

function greeting() {
  const h = getAEST().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function daysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function firstDayOfMonth(year, month) {
  return new Date(year, month - 1, 1).getDay(); // 0=Sun
}

function avatarColor(name) {
  const colors = ['#D4A843','#4A7C59','#D4823A','#6B8ED4','#C46B8A','#7B6BC4'];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function avatarInitials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(p => p[0]).slice(0, 2).join('').toUpperCase();
}

function trialDaysLeft(profile) {
  if (!profile) return 0;
  const end = new Date(profile.trial_ends_at);
  const now = new Date();
  return Math.max(0, Math.ceil((end - now) / (1000 * 60 * 60 * 24)));
}

function isExpired(profile) {
  if (!profile) return false;
  if (profile.subscription_status === 'active') return false;
  if (profile.subscription_status === 'trial') return trialDaysLeft(profile) === 0;
  return profile.subscription_status === 'expired';
}

function pwStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  if (score <= 1) return { label: 'Weak', color: 'var(--red)', pct: 20 };
  if (score <= 2) return { label: 'Fair', color: 'var(--orange)', pct: 40 };
  if (score <= 3) return { label: 'Good', color: 'var(--wheat)', pct: 65 };
  return { label: 'Strong', color: 'var(--green)', pct: 100 };
}

// ===== ROUTER =====
function navigate(route) {
  window.location.hash = '#' + route;
}

async function router() {
  const hash = window.location.hash || '#/';
  const [rawRoute, rawQuery] = hash.slice(1).split('?');
  const route = rawRoute || '/';
  const params = Object.fromEntries(new URLSearchParams(rawQuery || ''));

  const header = document.getElementById('app-header');
  const logoutBtn = document.getElementById('header-logout');
  const container = document.getElementById('view-container');

  // Check session
  const { data: { session } } = await db.auth.getSession();
  currentUser = session?.user || null;

  if (currentUser && !currentProfile) {
    currentProfile = await loadProfile(currentUser.id);
  }

  const publicRoutes = ['/', '/login', '/signup', '/forgot-password', '/accept-invite'];
  const isPublic = publicRoutes.includes(route);

  // Auth guard
  if (!isPublic && !currentUser) {
    navigate('/login');
    return;
  }

  // Paywall guard
  if (currentUser && currentProfile && isExpired(currentProfile) && route !== '/paywall' && route !== '/subscription') {
    navigate('/paywall');
    return;
  }

  // Onboarding guard
  if (currentUser && currentProfile && !currentProfile.onboarding_completed &&
      (currentProfile.role === 'admin' || currentProfile.role === 'both') &&
      route !== '/onboarding' && !isPublic) {
    navigate('/onboarding');
    return;
  }

  // Worker admin guard
  const adminRoutes = ['/workers', '/statements', '/xero'];
  if (currentUser && currentProfile && currentProfile.role === 'worker' && adminRoutes.includes(route)) {
    navigate('/dashboard');
    return;
  }

  // Header visibility
  const hideHeader = ['/', '/login', '/signup', '/forgot-password', '/accept-invite', '/paywall'].includes(route);
  if (hideHeader) {
    header.classList.add('hidden');
  } else {
    header.classList.remove('hidden');
    logoutBtn.classList.remove('hidden');
    updateSyncUI();
  }

  // Render route
  switch (route) {
    case '/': renderLanding(container); break;
    case '/signup': renderSignup(container); break;
    case '/login': renderLogin(container); break;
    case '/forgot-password': renderForgotPassword(container); break;
    case '/accept-invite': renderAcceptInvite(container, params); break;
    case '/onboarding': renderOnboarding(container); break;
    case '/dashboard': renderDashboard(container); break;
    case '/calendar': renderCalendar(container, null); break;
    default:
      if (route.startsWith('/calendar/')) {
        const workerId = route.split('/calendar/')[1];
        renderCalendar(container, workerId);
      } else {
        switch (route) {
          case '/workers': renderWorkers(container); break;
          case '/statements': renderStatements(container); break;
          case '/xero': renderXero(container); break;
          case '/settings': renderSettings(container, params); break;
          case '/subscription': renderSubscription(container); break;
          case '/paywall': renderPaywall(container); break;
          default: container.innerHTML = `<div class="page"><h2>404 — Page not found</h2><a href="#/" class="btn btn-ghost mt-16">Go home</a></div>`;
        }
      }
  }
}

    const password = document.getElementById('su-password').value;
    const role = document.querySelector('input[name=role]:checked').value;
    const biz = sanitize(document.getElementById('su-biz').value.trim());

    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Start free trial';
      return;
    }

    const { data, error } = await db.auth.signUp({
      email,
      password,
      options: { data: { full_name: name, role, business_name: biz || null } }
    });

    if (error) {
      errEl.textContent = error.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Start free trial';
      return;
    }

    // Create subscription row for admin
    if (role === 'admin' && data.user) {
      await db.from('subscriptions').insert({ admin_id: data.user.id });
      if (biz) await db.from('profiles').update({ business_name: biz }).eq('id', data.user.id);
    }

    currentUser = data.user;
    currentProfile = await loadProfile(data.user.id);
    if (role === 'admin') navigate('/onboarding');
    else navigate('/dashboard');
  });
}

async function acceptInvite(inviteId, adminId, token, dayRate) {
  const btn = document.getElementById('accept-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner spinner-sm"></div> Accepting...';

  // Update or create employer_worker_link
  const { error: linkErr } = await db.from('employer_worker_links').upsert({
    admin_id: adminId,
    worker_id: currentUser.id,
    day_rate: dayRate,
    status: 'active',
    accepted_at: new Date().toISOString(),
  }, { onConflict: 'admin_id,worker_id' });

  if (linkErr) { showToast('Failed to accept invitation. Please try again.', 'error'); btn.disabled = false; btn.textContent = 'Accept invitation'; return; }

  // Mark invite as accepted
  await db.from('invitations').update({ status: 'accepted' }).eq('id', inviteId);

  await writeAudit('worker_linked', 'employer_worker_links', `${adminId}-${currentUser.id}`, null, { admin_id: adminId, worker_id: currentUser.id, day_rate: dayRate }, 'worker');

  showToast('Invitation accepted! Welcome aboard.', 'success');
  setTimeout(() => navigate('/dashboard'), 1000);
}

function renderOnboardingStep(el) {
  const steps = ['Set up your business', 'Invite your first worker', 'Connect Xero'];
  const stepBars = steps.map((_, i) => {
    const state = i + 1 < onboardingStep ? 'done' : i + 1 === onboardingStep ? 'active' : '';
    return `<div class="progress-step ${state}"></div>`;
  }).join('');

  let body = '';
  if (onboardingStep === 1) {
    body = `

      <p class="text-muted mb-16">This helps personalise your invoices and statements.</p>

        <div class="form-group">

        </div>
        <button type="submit" class="btn btn-primary btn-full" id="ob1-btn">Save and continue</button>
      </form>`;
  } else if (onboardingStep === 2) {
    body = `
      <h2 style="font-size:28px;margin-bottom:8px">Invite your first worker</h2>
      <p class="text-muted mb-16">Enter their email address and set their daily rate. They'll receive an invitation to join.</p>
      <form id="ob2-form">
        <div class="form-group">
          <label class="form-label">Worker email</label>
          <input type="email" id="ob-email" class="form-input" placeholder="worker@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Day rate (AUD)</label>
          <input type="number" id="ob-rate" class="form-input" placeholder="350.00" min="1" step="0.01" required>
        </div>
        <div id="ob2-error" class="form-error hidden mb-8"></div>
        <button type="submit" class="btn btn-primary btn-full" id="ob2-btn">Send invitation</button>
      </form>
      <button class="btn btn-ghost btn-full mt-8" onclick="skipOnboarding()">I'll do this later →</button>`;
  } else if (onboardingStep === 3) {
    body = `
      <h2 style="font-size:28px;margin-bottom:8px">Connect your Xero account</h2>
      <p class="text-muted mb-16">PaddockPay will automatically create invoices in Xero at the end of each month.</p>
      <div class="card mb-16">
        <p class="text-sm">You'll need a <strong>Xero Developer account</strong> and a registered app with this redirect URI:</p>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px 12px;margin-top:10px;font-size:12px;word-break:break-all">
          https://qfuffybirntwooanvtte.supabase.co/functions/v1/xero-callback
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="startXeroOAuth()">Connect Xero</button>
      <button class="btn btn-ghost btn-full mt-8" onclick="completeOnboarding()">I'll connect Xero later →</button>`;
  }

  el.innerHTML = `
    <div class="page">
      <p class="progress-label">Step ${onboardingStep} of 3</p>
      <div class="progress-steps">${stepBars}</div>
      ${body}
    </div>
  `;

  if (onboardingStep === 1) {
    document.getElementById('ob1-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('ob1-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-sm"></div>';
      const biz = sanitize(document.getElementById('ob-biz').value.trim());
      const abn = sanitize(document.getElementById('ob-abn').value.trim());
      await db.from('profiles').update({ business_name: biz || null, abn: abn || null, onboarding_step: 2 }).eq('id', currentUser.id);
      currentProfile.business_name = biz;
      currentProfile.abn = abn;
      currentProfile.onboarding_step = 2;
      onboardingStep = 2;
      renderOnboardingStep(el);
    });
  }

  if (onboardingStep === 2) {
    document.getElementById('ob2-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('ob2-btn');
      const errEl = document.getElementById('ob2-error');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-sm"></div> Sending...';
      const email = document.getElementById('ob-email').value.trim();
      const rate = parseFloat(document.getElementById('ob-rate').value);
      try {

        errEl.classList.remove('hidden');
        btn.disabled = false;

      }
    });
  }
}

async function skipOnboarding() {
  const nextStep = onboardingStep + 1;
  if (nextStep > 3) { await completeOnboarding(); return; }
  await db.from('profiles').update({ onboarding_step: nextStep }).eq('id', currentUser.id);
  currentProfile.onboarding_step = nextStep;
  onboardingStep = nextStep;
  const el = document.getElementById('view-container');
  renderOnboardingStep(el);
}

async function completeOnboarding() {
  await db.from('profiles').update({ onboarding_completed: true, onboarding_step: 3 }).eq('id', currentUser.id);
  currentProfile.onboarding_completed = true;
  showToast("You're all set. Welcome to PaddockPay.", 'success');
  navigate('/dashboard');
}

function startXeroOAuth() {
  if (!currentUser) return;
  const state = currentUser.id + '.' + Date.now();
  const clientId = 'YOUR_XERO_CLIENT_ID'; // Set via Xero Developer Portal
  const redirectUri = 'https://qfuffybirntwooanvtte.supabase.co/functions/v1/xero-callback';
  const scope = 'openid profile email accounting.transactions accounting.contacts offline_access';
  const url = `https://login.xero.com/identity/connect/authorize?response_type=code&client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${encodeURIComponent(scope)}&state=${encodeURIComponent(state)}`;
  window.location.href = url;
}

async function renderAdminDashboard(el) {
  const profile = currentProfile;
  const now = getAEST();
  const month = now.getMonth() + 1;
  const year = now.getFullYear();

  // Get workers
  const { data: links } = await db.from('employer_worker_links')
    .select('*, profiles:worker_id(id,full_name,email)')
    .eq('admin_id', currentUser.id)
    .eq('status', 'active');

  const workers = links || [];

  // Get this month's labour days for all workers
  const workerIds = workers.map(w => w.worker_id);
  let workerDays = {};
  if (workerIds.length > 0) {
    const prefix = `${year}-${String(month).padStart(2,'0')}`;
    const { data: days } = await db.from('labour_days')
      .select('*')
      .eq('admin_id', currentUser.id)
      .like('day_key', `${prefix}%`);
    (days || []).forEach(d => {
      if (!workerDays[d.worker_id]) workerDays[d.worker_id] = [];
      workerDays[d.worker_id].push(d);
    });
  }

  const trialLeft = trialDaysLeft(profile);
  const expired = isExpired(profile);

  let bannerHtml = '';
  if (expired) {
    bannerHtml = `<div class="banner banner-error">Your free trial has ended. <a class="banner-link" href="#/paywall">Go to subscription →</a></div>`;
  } else if (profile.subscription_status === 'trial') {
    bannerHtml = `<div class="banner banner-trial">${trialLeft} day${trialLeft !== 1 ? 's' : ''} left in your free trial · <a class="banner-link" href="#/subscription">Upgrade</a></div>`;
  }

  let workerCardsHtml = '';
  let totalMonthAmount = 0;

  if (workers.length === 0) {
    workerCardsHtml = `
      <div class="empty-state">
        <div class="empty-state-icon">👥</div>
        <h3>No workers yet</h3>
        <p>Invite your first worker to get started.</p>
        <button class="btn btn-primary" onclick="showInviteSheet()">Invite worker</button>
      </div>`;
  } else {
    workerCardsHtml = workers.map(link => {
      const wp = link.profiles;
      const days = workerDays[link.worker_id] || [];
      const full = days.filter(d => d.day_type === 'full').length;
      const half = days.filter(d => d.day_type === 'half').length;
      const total = full + half * 0.5;
      const amount = total * link.day_rate;
      totalMonthAmount += amount;
      const lastDay = days.sort((a,b) => b.day_key.localeCompare(a.day_key))[0];
      const color = avatarColor(wp?.full_name || '');
      const initials = avatarInitials(wp?.full_name || '?');
      return `
        <div class="worker-card">
          <div class="avatar" style="background:${color}">${initials}</div>
          <div class="worker-card-info">
            <div class="worker-name">${sanitize(wp?.full_name || 'Unknown')}</div>
            <div class="worker-stats">This month: ${full} full + ${half} half = ${total} days</div>
            <div class="worker-amount">${formatAUD(amount)}</div>
            ${lastDay ? `<div class="text-xs text-muted">Last logged ${formatDate(lastDay.day_key)}</div>` : '<div class="text-xs text-muted">No days logged yet</div>'}
          </div>
          <a href="#/calendar/${link.worker_id}" class="btn btn-ghost btn-sm">View →</a>
        </div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="page">
      <h2 style="font-size:26px;margin-bottom:4px">${greeting()}, ${sanitize(profile.full_name?.split(' ')[0] || 'there')}</h2>
      <p class="text-muted text-sm mb-16">${monthLabel(month, year)}</p>
      ${bannerHtml}

      ${workers.length > 0 ? `
      <div class="card mb-16">
        <div class="text-muted text-xs mb-4">Total invoiceable this month</div>
        <div style="font-size:28px;color:var(--wheat);font-weight:600">${formatAUD(totalMonthAmount)}</div>
      </div>` : ''}

      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="showInviteSheet()">+ Add worker</button>
        <a href="#/statements" class="btn btn-ghost btn-sm">View statements</a>
        <a href="#/xero" class="btn btn-ghost btn-sm">Xero</a>
      </div>

      <h3 style="font-size:16px;margin-bottom:10px;color:var(--muted)">Your workers</h3>
      ${workerCardsHtml}
    </div>

    <div id="invite-backdrop" class="sheet-backdrop" onclick="closeSheet()"></div>
    <div id="invite-sheet" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Invite a worker</div>
      <form id="invite-form">
        <div class="form-group">
          <label class="form-label">Worker email</label>
          <input type="email" id="inv-email" class="form-input" placeholder="worker@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Day rate (AUD)</label>
          <input type="number" id="inv-rate" class="form-input" placeholder="350.00" min="1" step="0.01" required>
        </div>
        <div id="inv-error" class="form-error hidden mb-8"></div>
        <button type="submit" class="btn btn-primary btn-full" id="inv-btn">Send invitation</button>
        <button type="button" class="btn btn-ghost btn-full mt-8" onclick="closeSheet()">Cancel</button>
      </form>
    </div>
  `;

  document.getElementById('invite-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('inv-btn');
    const errEl = document.getElementById('inv-error');
    errEl.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner spinner-sm"></div> Sending...';
    const email = document.getElementById('inv-email').value.trim();
    const rate = parseFloat(document.getElementById('inv-rate').value);
    try {
      const { error } = await db.functions.invoke('send-invitation', {
        body: { admin_id: currentUser.id, invited_email: email, day_rate: rate }

      if (error) throw error;
      closeSheet();
      showToast(`Invitation sent to ${email}`, 'success');
      renderDashboard(el);
    } catch {
      errEl.textContent = 'Failed to send invitation. Check your connection and try again.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Send invitation';
    }
  });
}

// ===== CALENDAR =====
let calYear, calMonth, calDays = {}, calLink = null, calIsAdmin = false, calWorkerId = null, calBackfillEnabled = false;

async function renderCalendar(el, workerId) {
  el.innerHTML = `<div class="page"><div class="flex-center" style="min-height:60vh"><div class="spinner spinner-lg" style="color:var(--wheat)"></div></div></div>`;
  if (!currentProfile) currentProfile = await loadProfile(currentUser.id);

  const isAdmin = currentProfile.role === 'admin' || currentProfile.role === 'both';
  calIsAdmin = isAdmin && workerId;
  calWorkerId = workerId || currentUser.id;

  const now = getAEST();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth() + 1; }

  // Get day rate from link
  if (isAdmin && workerId) {
    const { data: link } = await db.from('employer_worker_links')
      .select('*')
      .eq('admin_id', currentUser.id)
      .eq('worker_id', workerId)
      .single();
    calLink = link;
  } else {
    const { data: link } = await db.from('employer_worker_links')
      .select('*')
      .eq('worker_id', currentUser.id)
      .eq('status', 'active')
      .single();
    calLink = link;
  }

  await loadCalendarDays();
  renderCalendarView(el);
}

async function loadCalendarDays() {
  const prefix = `${calYear}-${String(calMonth).padStart(2,'0')}`;
  let query = db.from('labour_days').select('*').like('day_key', `${prefix}%`).eq('worker_id', calWorkerId);
  if (calIsAdmin) query = query.eq('admin_id', currentUser.id);
  const { data } = await query;
  calDays = {};
  (data || []).forEach(d => { calDays[d.day_key] = d; });
}

function renderCalendarView(el) {
  const now = getAEST();
  const todayKey = dayKey(now);
  const numDays = daysInMonth(calYear, calMonth);
  const firstDay = firstDayOfMonth(calYear, calMonth);
  const isCurrentMonth = calYear === now.getFullYear() && calMonth === now.getMonth() + 1;

  const full = Object.values(calDays).filter(d => d.day_type === 'full').length;
  const half = Object.values(calDays).filter(d => d.day_type === 'half').length;
  const total = full + half * 0.5;
  const amount = calLink ? total * calLink.day_rate : 0;

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= numDays; d++) {
    const dk = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data = calDays[dk];
    const isToday = dk === todayKey;
    const isFuture = dk > todayKey && !isToday;
    const isPastMonth = !isCurrentMonth && calMonth < now.getMonth() + 1;
    const isBackfillable = calIsAdmin && calBackfillEnabled;
    const canTap = !isFuture || (isBackfillable);
    const locked = isFuture && !isBackfillable;
    const cls = ['cal-day', data?.day_type || '', isToday ? 'today' : '', locked ? 'future' : ''].filter(Boolean).join(' ');
    const noteIndicator = data?.notes ? '<div class="cal-day-note"></div>' : '';
    const onclick = canTap ? `openDaySheet('${dk}')` : '';
    cells += `<div class="${cls}" ${onclick ? `onclick="${onclick}"` : ''}>${d}${noteIndicator}</div>`;
  }

  const backfillToggle = calIsAdmin ? `
    <div class="toggle-wrap card mb-12">
      <div class="toggle-label-group">
        <div class="toggle-label">Backfill mode</div>
        <div class="toggle-desc">Enable to edit past months</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="backfill-toggle" ${calBackfillEnabled ? 'checked' : ''} onchange="toggleBackfill(this.checked, this.closest('.page').parentElement)">
        <div class="toggle-slider"></div>
      </label>
    </div>` : '';

  const workerName = calIsAdmin ? `<p class="text-muted text-sm mb-12">Viewing worker calendar</p>` : '';

  el.innerHTML = `
    <div class="page">
      ${workerName}
      ${backfillToggle}

      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev(this.closest('.page').parentElement)">‹</button>
        <div class="cal-month-label">${monthLabel(calMonth, calYear)}</div>
        <button class="cal-nav-btn" onclick="calNext(this.closest('.page').parentElement)" ${isCurrentMonth && !calBackfillEnabled ? '' : ''}>›</button>
      </div>

      <div class="cal-grid">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-header-cell">${d}</div>`).join('')}
        ${cells}
      </div>

      <div class="cal-summary">
        <div class="cal-summary-item"><div class="cal-summary-num" style="color:var(--green)">${full}</div><div class="cal-summary-label">Full days</div></div>
        <div class="cal-summary-item"><div class="cal-summary-num" style="color:var(--orange)">${half}</div><div class="cal-summary-label">Half days</div></div>
        <div class="cal-summary-item"><div class="cal-summary-num">${total}</div><div class="cal-summary-label">Total days</div></div>
        <div class="cal-summary-item"><div class="cal-summary-num" style="font-size:16px">${formatAUD(amount)}</div><div class="cal-summary-label">Total amount</div></div>
      </div>

      ${calIsAdmin ? `<a href="#/workers" class="btn btn-ghost btn-full mt-16">← Back to workers</a>` : ''}
    </div>

    <div id="day-backdrop" class="sheet-backdrop" onclick="closeDaySheet()"></div>
    <div id="day-sheet" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="day-sheet-title"></div>
      <div class="day-type-grid" id="day-type-grid"></div>
      <div class="form-group">
        <label class="form-label">Notes <span class="text-muted">(optional, max 100 chars)</span></label>
        <input type="text" id="day-notes" class="form-input" placeholder="e.g. Spraying north paddock" maxlength="100">
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-ghost" style="flex:1" onclick="closeDaySheet()">Cancel</button>
        <button class="btn btn-primary" style="flex:2" id="day-save-btn" onclick="saveDay()">Save</button>
      </div>
    </div>
  `;
}

let activeDayKey = null, activeDayType = null;

function openDaySheet(dk) {
  activeDayKey = dk;
  const existing = calDays[dk];
  activeDayType = existing?.day_type || null;

  const date = new Date(dk + 'T00:00:00');
  const label = date.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('day-sheet-title').textContent = label;
  document.getElementById('day-notes').value = existing?.notes || '';

  const rate = calLink?.day_rate || 0;
  const types = [
    { id: 'full', label: 'Full Day', amount: formatAUD(rate), cls: activeDayType === 'full' ? 'selected-full' : '' },
    { id: 'half', label: 'Half Day', amount: formatAUD(rate * 0.5), cls: activeDayType === 'half' ? 'selected-half' : '' },
    { id: 'clear', label: 'Clear', amount: '', cls: !activeDayType && existing === undefined ? '' : (activeDayType === null && existing ? 'selected-clear' : '') },
  ];

  document.getElementById('day-type-grid').innerHTML = types.map(t => `
    <div class="day-type-btn ${t.cls}" id="dt-${t.id}" onclick="selectDayType('${t.id}')">
      <div class="day-type-label">${t.label}</div>
      <div class="day-type-amount">${t.amount}</div>
    </div>`).join('');

  document.getElementById('day-backdrop').classList.add('visible');
  document.getElementById('day-sheet').classList.add('visible');
  setTimeout(() => document.getElementById('day-notes').focus(), 300);
}

function selectDayType(type) {
  activeDayType = type === 'clear' ? null : type;
  ['full','half','clear'].forEach(t => {
    const el = document.getElementById(`dt-${t}`);
    if (el) el.className = 'day-type-btn';
  });
  if (type !== 'clear') {
    document.getElementById(`dt-${type}`).classList.add(`selected-${type}`);
  } else {
    document.getElementById('dt-clear').classList.add('selected-clear');
  }
}

async function saveDay() {
  const btn = document.getElementById('day-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner spinner-sm"></div>';

  const notes = sanitize(document.getElementById('day-notes').value.trim());
  const existing = calDays[activeDayKey];

  if (activeDayType === null) {
    // Delete / clear
    if (existing) {
      if (navigator.onLine) {
        const { error } = await db.from('labour_days').delete().eq('id', existing.id);
        if (!error) {
          await writeAudit('day_deleted', 'labour_days', existing.id, existing, null);
          delete calDays[activeDayKey];
        }
      } else {
        await queueOfflineAction('delete', 'labour_days', { id: existing.id });
        delete calDays[activeDayKey];
        showToast('Saved locally', 'info');
      }
    }
  } else {
    const adminId = calIsAdmin ? currentUser.id : (calLink?.admin_id || currentUser.id);
    const payload = {
      worker_id: calWorkerId,
      admin_id: adminId,
      day_key: activeDayKey,
      day_type: activeDayType,
      notes: notes || null,
    };

    if (navigator.onLine) {
      const { data, error } = await db.from('labour_days').upsert(payload, { onConflict: 'worker_id,admin_id,day_key' }).select().single();
      if (!error && data) {
        const isNew = !existing;
        await writeAudit(isNew ? 'day_logged' : 'day_edited', 'labour_days', data.id, existing || null, data);
        calDays[activeDayKey] = data;
      } else if (error) {
        showToast('Failed to save. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Save';
        return;
      }
    } else {
      await queueOfflineAction('upsert', 'labour_days', payload);
      calDays[activeDayKey] = { ...payload, id: 'offline-' + Date.now() };
      showToast('Saved locally — will sync when online', 'info');
    }
  }

  closeDaySheet();
  renderCalendarView(document.getElementById('view-container'));
  btn.disabled = false;
  btn.textContent = 'Save';
}

function closeDaySheet() {
  document.getElementById('day-backdrop')?.classList.remove('visible');
  document.getElementById('day-sheet')?.classList.remove('visible');
  activeDayKey = null;
  activeDayType = null;
}

async function calPrev(el) {
  calMonth--;
  if (calMonth < 1) { calMonth = 12; calYear--; }
  await loadCalendarDays();
  renderCalendarView(el || document.getElementById('view-container'));
}

async function calNext(el) {
  calMonth++;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  await loadCalendarDays();
  renderCalendarView(el || document.getElementById('view-container'));
}

async function toggleBackfill(enabled, el) {
  calBackfillEnabled = enabled;
  await loadCalendarDays();
  renderCalendarView(el || document.getElementById('view-container'));
}

async function renderWorkers(el) {
  el.innerHTML = `<div class="page"><div class="flex-center" style="min-height:60vh"><div class="spinner spinner-lg" style="color:var(--wheat)"></div></div></div>`;

  const { data: pendingInvites } = await db.from('invitations')

    .eq('status', 'pending')

  const active = (links || []).filter(l => l.status === 'active');

      <div class="worker-card" id="wcard-${link.id}">

          <div class="worker-name">${sanitize(wp?.full_name || 'Unknown')}</div>
          <div class="text-sm text-muted">${sanitize(wp?.email || '')}</div>
          <div class="text-sm mt-4">Rate: <span id="rate-display-${link.id}">${formatAUD(link.day_rate)}/day</span></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <a href="#/calendar/${link.worker_id}" class="btn btn-ghost btn-sm">Calendar</a>
          <button class="btn btn-ghost btn-sm" onclick="editRate('${link.id}',${link.day_rate})">Edit rate</button>
          <button class="btn btn-danger btn-sm" onclick="removeWorker('${link.id}','${link.worker_id}','${sanitize(wp?.full_name || 'Worker')}')">Remove</button>

  el.innerHTML = `
    <div class="page">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="font-size:24px">Workers</h2>
        <button class="btn btn-primary btn-sm" onclick="showWorkerInviteSheet()">+ Invite worker</button>

      ${pendingInvites?.length > 0 ? `
      <h3 style="font-size:16px;margin:20px 0 10px;color:var(--muted)">Pending invitations</h3>
      ${pendingInvites.map(inv => `
        <div class="card" style="display:flex;align-items:center;gap:12px">
          <div style="flex:1">
            <div class="fw-600">${sanitize(inv.invited_email)}</div>
            <div class="text-xs text-muted">Sent ${formatDate(inv.created_at?.split('T')[0])} · ${formatAUD(inv.day_rate)}/day</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="resendInvite('${inv.id}','${sanitize(inv.invited_email)}',${inv.day_rate})">Resend</button>
            <button class="btn btn-danger btn-sm" onclick="cancelInvite('${inv.id}')">Cancel</button>
          </div>
        </div>`).join('')}` : ''}
    </div>

    <div id="worker-invite-backdrop" class="sheet-backdrop" onclick="closeSheet()"></div>
    <div id="worker-invite-sheet" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Invite a worker</div>
      <form id="wi-form">
        <div class="form-group"><label class="form-label">Worker email</label><input type="email" id="wi-email" class="form-input" placeholder="worker@example.com" required></div>
        <div class="form-group"><label class="form-label">Day rate (AUD)</label><input type="number" id="wi-rate" class="form-input" placeholder="350.00" min="1" step="0.01" required></div>
        <div id="wi-error" class="form-error hidden mb-8"></div>
        <button type="submit" class="btn btn-primary btn-full" id="wi-btn">Send invitation</button>
        <button type="button" class="btn btn-ghost btn-full mt-8" onclick="closeSheet()">Cancel</button>

    <div id="remove-modal" class="modal-backdrop hidden">

function showWorkerInviteSheet() {
  document.getElementById('worker-invite-backdrop')?.classList.add('visible');
  document.getElementById('worker-invite-sheet')?.classList.add('visible');
}

function editRate(linkId, currentRate) {
  const displayEl = document.getElementById(`rate-display-${linkId}`);
  if (!displayEl) return;
  const parent = displayEl.parentElement;
  parent.innerHTML = `<div style="display:flex;align-items:center;gap:6px">
    <input type="number" id="rate-input-${linkId}" value="${currentRate}" min="1" step="0.01" style="width:80px;padding:4px 8px;border:1px solid var(--wheat);border-radius:4px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px">
    <button class="btn btn-primary btn-sm" onclick="saveRate('${linkId}')">Save</button>
    <button class="btn btn-ghost btn-sm" onclick="renderWorkers(document.getElementById('view-container'))">✕</button>
  </div>`;
}

async function saveRate(linkId) {
  const inp = document.getElementById(`rate-input-${linkId}`);
  const newRate = parseFloat(inp.value);
  if (!newRate || newRate <= 0) { showToast('Invalid rate', 'error'); return; }
  const { data: link } = await db.from('employer_worker_links').select('day_rate').eq('id', linkId).single();
  const oldRate = link?.day_rate;
  const { error } = await db.from('employer_worker_links').update({ day_rate: newRate }).eq('id', linkId).eq('admin_id', currentUser.id);
  if (error) { showToast('Failed to update rate', 'error'); return; }
  await writeAudit('day_rate_changed', 'employer_worker_links', linkId, { day_rate: oldRate }, { day_rate: newRate }, 'admin');
  showToast('Day rate updated', 'success');
  renderWorkers(document.getElementById('view-container'));
}

function removeWorker(linkId, workerId, name) {
  const modal = document.getElementById('remove-modal');
  document.getElementById('remove-modal-msg').textContent = `Removing ${name} will unlink them from your account. Their historical data is retained.`;
  document.getElementById('remove-confirm-btn').onclick = async () => {
    await db.from('employer_worker_links').update({ status: 'inactive' }).eq('id', linkId).eq('admin_id', currentUser.id);
    await writeAudit('worker_unlinked', 'employer_worker_links', linkId, null, { status: 'inactive' }, 'admin');
    modal.classList.add('hidden');
    showToast(`${name} removed`, 'success');
    renderWorkers(document.getElementById('view-container'));
  };
  modal.classList.remove('hidden');
}

async function resendInvite(inviteId, email, dayRate) {
  try {
    await db.functions.invoke('send-invitation', { body: { admin_id: currentUser.id, invited_email: email, day_rate: dayRate } });
    showToast(`Invitation resent to ${email}`, 'success');
  } catch { showToast('Failed to resend', 'error'); }
}

async function cancelInvite(inviteId) {
  await db.from('invitations').update({ status: 'expired' }).eq('id', inviteId).eq('admin_id', currentUser.id);
  showToast('Invitation cancelled', 'success');
  renderWorkers(document.getElementById('view-container'));
}

    const statements = await loadStatements();

    el.innerHTML = `

            <p>Statements are generated automatically at month end, or generate them manually above.</p>

            return `
              <div class="card">
                <div style="display:flex;align-items:center;gap:12px">

                    <div class="text-sm text-muted">${monthLabel(s.month, s.year)} · ${s.total_days} days · ${formatAUD(s.total_amount)}</div>
                    ${s.xero_invoice_number ? `<div class="text-xs text-muted">Xero: ${sanitize(s.xero_invoice_number)}</div>` : ''}
                  </div>
                  <span class="badge badge-${s.status}">${s.status}</span>
                </div>
                <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
                  <button class="btn btn-ghost btn-sm" onclick="viewStatement('${s.id}')">View detail</button>
                  ${!s.xero_invoice_id ? `<button class="btn btn-ghost btn-sm" onclick="pushToXero('${s.id}')">Send to Xero</button>` : ''}
                  ${s.status !== 'draft' ? `<button class="btn btn-ghost btn-sm" onclick="resendStatement('${s.id}')">Resend email</button>` : ''}
                </div>
              </div>`;
          }).join('')}
      </div>

      <div id="stmt-modal" class="modal-backdrop hidden">
        <div class="modal" id="stmt-modal-body"></div>
      </div>
    `;

    document.getElementById('st-month').addEventListener('change', e => { filterMonth = parseInt(e.target.value); render(); });
    document.getElementById('st-year').addEventListener('change', e => { filterYear = parseInt(e.target.value); render(); });
    document.getElementById('st-worker').addEventListener('change', e => { filterWorker = e.target.value; render(); });
  }

  await render();
}

async function generateStatements(month, year) {
  const btn = document.getElementById('gen-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner spinner-sm"></div> Generating...';
  try {
    const { error } = await db.functions.invoke('send-monthly-statements', { body: { admin_id: currentUser.id, month, year } });
    if (error) throw error;
    showToast('Statements generated successfully', 'success');
    renderStatements(document.getElementById('view-container'));
  } catch {
    showToast('Failed to generate statements', 'error');
    btn.disabled = false;
    btn.textContent = `Generate statements for ${monthLabel(month, year)}`;
  }
}

async function viewStatement(id) {
  const { data: s } = await db.from('monthly_statements').select('*, profiles:worker_id(full_name,email)').eq('id', id).single();
  if (!s) return;
  const breakdown = s.day_breakdown || [];
  const modal = document.getElementById('stmt-modal');
  document.getElementById('stmt-modal-body').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="modal-title" style="margin:0">${monthLabel(s.month, s.year)} — ${sanitize(s.profiles?.full_name||'')}</div>
      <button onclick="document.getElementById('stmt-modal').classList.add('hidden')" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
      <div><span class="badge badge-${s.status}">${s.status}</span></div>
      <div class="text-sm text-muted">${s.full_days} full + ${s.half_days} half = ${s.total_days} days</div>
      <div class="text-sm fw-600">${formatAUD(s.total_amount)}</div>
    </div>
    ${s.xero_invoice_number ? `<div class="text-sm mb-8">Xero invoice: <strong>${sanitize(s.xero_invoice_number)}</strong>${s.xero_invoice_url ? ` <a href="${sanitize(s.xero_invoice_url)}" target="_blank" rel="noopener">View →</a>` : ''}</div>` : ''}
    ${s.sent_at ? `<div class="text-sm text-muted mb-8">Emailed to ${sanitize(s.email_sent_to)} on ${formatDate(s.sent_at?.split('T')[0])}</div>` : ''}

    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr><th>Date</th><th>Type</th><th>Notes</th><th>Amount</th></tr></thead>

  await db.from('profiles').update({
    xero_tenant_id: null,
    xero_access_token_encrypted: null,
    xero_refresh_token_encrypted: null,
    xero_token_expiry: null,

async function renderSettings(el, params) {
  if (!currentProfile) currentProfile = await loadProfile(currentUser.id);

      const btn = document.querySelector(`.tab-btn[data-tab="${t.id}"]`);

          <div id="profile-error" class="form-error hidden mb-8"></div>
          <button type="submit" class="btn btn-primary" id="profile-save-btn">Save changes</button>
        </form>`;
      document.getElementById('profile-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('profile-save-btn');
        btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div>';

          full_name: sanitize(document.getElementById('s-name').value.trim()),
          business_name: sanitize(document.getElementById('s-biz').value.trim()) || null,
          abn: sanitize(document.getElementById('s-abn').value.trim()) || null,

        else { Object.assign(currentProfile, updates); showToast('Profile saved', 'success'); }

      });
    } else if (activeTab === 'password') {
      tabContent.innerHTML = `
        <form id="pw-form">
          <div class="form-group"><label class="form-label">New password</label><div class="input-wrap"><input type="password" id="s-pw" class="form-input" placeholder="Min 8 characters" minlength="8" required><button type="button" class="input-toggle" onclick="togglePw('s-pw',this)">👁</button></div></div>
          <div class="form-group"><label class="form-label">Confirm new password</label><div class="input-wrap"><input type="password" id="s-pw2" class="form-input" placeholder="Repeat password" required><button type="button" class="input-toggle" onclick="togglePw('s-pw2',this)">👁</button></div></div>
          <div id="pw-error" class="form-error hidden mb-8"></div>
          <button type="submit" class="btn btn-primary" id="pw-save-btn">Update password</button>
        </form>`;
      document.getElementById('pw-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('pw-save-btn');
        const errEl = document.getElementById('pw-error');
        const pw = document.getElementById('s-pw').value;
        const pw2 = document.getElementById('s-pw2').value;
        if (pw !== pw2) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('hidden'); return; }
        btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div>';

      tabContent.innerHTML = `<div class="flex-center" style="min-height:120px"><div class="spinner spinner-md" style="color:var(--wheat)"></div></div>`;
      const { data: logs } = await db.from('audit_log').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(100);
      const actionFilter = ['all','day_logged','day_edited','day_deleted','statement_sent','xero_invoice_created','day_rate_changed','worker_linked','worker_unlinked'];

      tabContent.innerHTML = `
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <select id="audit-filter" class="form-input" style="width:auto;padding:8px 12px;flex:1">

            <tbody>
              ${(logs||[]).map(l=>`<tr data-action="${l.action}"><td class="text-xs">${new Date(l.created_at).toLocaleString('en-AU')}</td><td class="text-xs">${l.action.replace(/_/g,' ')}</td><td class="text-xs">${l.record_id||'—'}</td><td class="text-xs">${l.performed_by_role}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>`}
      `;
      document.getElementById('audit-filter')?.addEventListener('change', e => {
        const val = e.target.value;
        document.querySelectorAll('#audit-table tbody tr').forEach(row => {
          row.style.display = (val === 'all' || row.dataset.action === val) ? '' : 'none';

    } else if (activeTab === 'danger') {
      tabContent.innerHTML = `
        <div class="card" style="border-color:var(--red)">
          <h3 class="fw-600 text-red" style="margin-bottom:8px">Delete my account</h3>

          <button class="btn btn-danger btn-full" onclick="deleteAccount()">Delete my account permanently</button>
        </div>`;

  el.innerHTML = `
    <div class="page">
      <h2 style="font-size:24px;margin-bottom:16px">Settings</h2>
      <div class="tab-nav">
        ${tabs.map(t => `<button class="tab-btn${t.id === activeTab ? ' active' : ''}" data-tab="${t.id}" onclick="switchSettingsTab('${t.id}')">${t.label}</button>`).join('')}
      </div>
      <div id="settings-tab-content"></div>
    </div>
  `;

  window.switchSettingsTab = (tab) => { activeTab = tab; renderTabContent(); };
  renderTabContent();
}

function exportAuditCSV() {
  const rows = document.querySelectorAll('#audit-table tbody tr');
  const lines = [['Date/Time','Action','Record','Role']];
  rows.forEach(r => {
    const cells = r.querySelectorAll('td');
    lines.push([...cells].map(c => `"${c.textContent.replace(/"/g,'""')}"`));
  });
  const csv = lines.map(l => l.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'paddockpay-audit-log.csv';
  a.click();
}

async function deleteAccount() {
  const confirm = document.getElementById('delete-confirm')?.value;
  if (confirm !== 'DELETE') { showToast('Type DELETE exactly to confirm', 'error'); return; }
  // Account deletion via Supabase Auth — cascades to all profile data
  const { error } = await db.rpc('delete_user');
  if (error) { showToast('Contact support@paddockpay.com.au to delete your account.', 'error'); return; }
  await db.auth.signOut();
  currentUser = null; currentProfile = null;
  showToast('Account deleted', 'success');
  navigate('/');
}

      <h2 style="font-size:28px;margin-bottom:10px">Your free trial has ended</h2>
      <p class="text-muted mb-24" style="max-width:360px">Upgrade to keep tracking days and sending invoices.</p>
      <a href="#/subscription" class="btn btn-primary" style="margin-bottom:12px">View subscription options</a>
      ${canExtend ? `<button class="btn btn-ghost" id="extend-btn" onclick="extendTrial()">Extend my trial by 7 days</button>` : ''}
      <p class="text-sm text-muted mt-24">Questions? <a href="mailto:support@paddockpay.com.au">support@paddockpay.com.au</a></p>
      <button class="btn btn-ghost btn-sm mt-12" onclick="authSignOut()">Log out</button>
    </div>
  `;
}

async function extendTrial() {
  if (currentProfile.trial_extended) { showToast('Trial extension already used', 'error'); return; }
  const btn = document.getElementById('extend-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div>'; }
  const newEnd = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString();
  await db.from('profiles').update({ trial_extended: true, trial_ends_at: newEnd, subscription_status: 'trial' }).eq('id', currentUser.id);
  currentProfile.trial_extended = true;
  currentProfile.trial_ends_at = newEnd;
  currentProfile.subscription_status = 'trial';
  showToast('Trial extended by 7 days!', 'success');
  navigate('/dashboard');
}

// ===== INIT =====
async function init() {
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/paddockpay/sw.js').catch(() => {});
  }

  // Open IndexedDB
  await openIDB();

  // Check session
  const { data: { session } } = await db.auth.getSession();
  currentUser = session?.user || null;
  if (currentUser) {
    currentProfile = await loadProfile(currentUser.id);
    await updatePendingCount();
    if (navigator.onLine) flushQueue();
  }

  // Handle Xero callback params
  const hash = window.location.hash;
  if (hash.includes('xero=connected')) {
    showToast('Xero connected successfully!', 'success');
    await writeAudit('xero_connected', 'profiles', currentUser?.id, null, { connected: true }, 'admin');
  } else if (hash.includes('xero=error')) {
    showToast('Xero connection failed. Please try again.', 'error');
  }

  // Hide loading, show app
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Route
  await router();

  // Listen for auth changes
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') {
      currentUser = session.user;
      currentProfile = await loadProfile(session.user.id);
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      currentProfile = null;
    }
  });
}

init();
</script>
