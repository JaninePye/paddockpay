<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PaddockPay</title>
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #1A1008;
      --card:   #251508;
      --card2:  #2E1A0A;
      --border: #3D2210;
      --wheat:  #D4A843;
      --wheat2: #B88A30;
      --wheat-dim: rgba(212,168,67,0.18);
      --fg:     #F2E4C4;
      --muted:  #7A6248;
      --green:  #4E9A5A;
      --red:    #C0392B;
      --half:   rgba(212,168,67,0.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 20;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--wheat); }
    .tabs {
      display: flex; background: var(--card);
      border-radius: 10px; padding: 3px; gap: 2px;
      border: 1px solid var(--border);
    }
    .tab {
      padding: 7px 14px; border-radius: 8px; border: none;
      background: transparent; color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 13px;
      cursor: pointer; transition: all 0.15s;
    }
    .tab.on { background: var(--wheat); color: var(--bg); font-weight: 500; }

    /* ── SCREENS ── */
    .screen { display: none; max-width: 440px; margin: 0 auto; padding: 28px 20px 100px; }
    .screen.on { display: block; }

    /* ── SHARED COMPONENTS ── */
    .sec-label {
      font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .day-list { display: flex; flex-direction: column; gap: 6px; }
    .day-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; background: var(--card);
      border-radius: 12px; border: 1px solid var(--border);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--wheat); flex-shrink: 0; }
    .empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
    .spinner {
      width: 22px; height: 22px; border: 2px solid var(--border);
      border-top-color: var(--wheat); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── JOSH ── */
    .date-block { text-align: center; margin-bottom: 36px; }
    .date-weekday { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .date-full { font-family: 'Playfair Display', serif; font-size: 30px; }
    .day-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 10px; }
    .big-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; width: 100%;
      padding: 28px 16px; border-radius: 20px;
      border: 2px solid var(--wheat); background: transparent;
      color: var(--wheat); cursor: pointer; transition: all 0.18s;
    }
    .big-btn .btn-icon  { font-size: 28px; line-height: 1; }
    .big-btn .btn-label { font-family: 'Playfair Display', serif; font-size: 17px; }
    .big-btn .btn-rate  { font-size: 12px; color: var(--muted); }
    .big-btn:hover:not(:disabled) {
      background: var(--wheat); color: var(--bg);
      transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,168,67,0.2);
    }
    .big-btn:hover:not(:disabled) .btn-rate { color: var(--bg); opacity: 0.7; }
    .big-btn:active:not(:disabled) { transform: translateY(0); }
    .big-btn.done { background: var(--green); border-color: var(--green); color: #fff; cursor: default; }
    .big-btn.done .btn-rate { color: rgba(255,255,255,0.7); }
    .big-btn.done:hover { transform: none; box-shadow: none; }
    .logged-badge {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 20px; border-radius: 20px; background: var(--green);
      color: #fff; font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 8px;
    }
    .undo-btn {
      display: block; width: 100%; padding: 10px; background: transparent;
      border: none; color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 12px; cursor: pointer; text-align: center; margin-bottom: 28px;
      transition: color 0.15s;
    }
    .undo-btn:hover { color: var(--red); }

    /* ── CALENDAR ── */
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .cal-nav-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--fg); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .cal-nav-btn:hover { border-color: var(--wheat); color: var(--wheat); }
    .cal-nav-btn:disabled { opacity: 0.3; pointer-events: none; }
    .cal-month-lbl { font-family: 'Playfair Display', serif; font-size: 22px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; margin-bottom: 16px;
    }
    .cal-dow {
      text-align: center; font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      padding: 6px 0;
    }
    .cal-day {
      aspect-ratio: 1; border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px; position: relative;
      border: 1.5px solid transparent; transition: all 0.12s;
      gap: 2px;
    }
    .cal-day:hover:not(.cal-empty):not(.cal-future) { border-color: var(--wheat); }
    .cal-day.cal-empty { cursor: default; }
    .cal-day.cal-future { opacity: 0.25; cursor: default; }
    .cal-day.cal-today { border-color: var(--fg) !important; }
    .cal-day.cal-full    { background: var(--wheat); color: var(--bg); font-weight: 600; }
    .cal-day.cal-half    { background: var(--half); color: var(--wheat); font-weight: 600; }
    .cal-day.cal-nowork  { background: var(--border); color: var(--muted); font-weight: 600; }
    .cal-day.cal-full .cal-pip, .cal-day.cal-half .cal-pip, .cal-day.cal-nowork .cal-pip { display: block; }
    .cal-pip { display: none; font-size: 10px; line-height: 1; }
    .cal-hint { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .cal-legend {
      display: flex; gap: 16px; justify-content: center;
      font-size: 12px; color: var(--muted); margin-bottom: 0;
    }
    .cal-legend-item { display: flex; align-items: center; gap: 6px; }
    .cal-legend-dot {
      width: 12px; height: 12px; border-radius: 4px;
    }

    /* ── DAY SHEET (bottom popup) ── */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .sheet-backdrop.on { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card2); border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 20px 20px calc(env(safe-area-inset-bottom) + 20px);
      z-index: 31; transform: translateY(100%); transition: transform 0.25s ease;
      max-width: 480px; margin: 0 auto;
    }
    .sheet.on { transform: translateY(0); }
    .sheet-title {
      font-family: 'Playfair Display', serif; font-size: 18px;
      text-align: center; margin-bottom: 4px;
    }
    .sheet-sub { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 20px; }
    .sheet-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .sheet-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 18px 12px; border-radius: 14px;
      border: 2px solid var(--wheat); background: transparent;
      color: var(--wheat); cursor: pointer; font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }
    .sheet-btn .s-icon  { font-size: 24px; }
    .sheet-btn .s-label { font-family: 'Playfair Display', serif; font-size: 16px; }
    .sheet-btn .s-rate  { font-size: 12px; color: var(--muted); }
    .sheet-btn:hover { background: var(--wheat); color: var(--bg); }
    .sheet-btn:hover .s-rate { color: var(--bg); opacity: 0.7; }
    .sheet-remove {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1px solid var(--red); background: transparent;
      color: var(--red); font-family: 'DM Mono', monospace;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .sheet-remove:hover { background: var(--red); color: #fff; }
    .sheet-cancel {
      width: 100%; padding: 10px; border: none; background: transparent;
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 12px; cursor: pointer; margin-top: 4px;
    }

    /* ── JANINE ── */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .mnav-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--fg); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .mnav-btn:hover { border-color: var(--wheat); color: var(--wheat); }
    .month-label { font-family: 'Playfair Display', serif; font-size: 22px; }
    .earn-card {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 18px; padding: 28px 24px; margin-bottom: 20px;
      text-align: center; position: relative; overflow: hidden;
    }
    .earn-card::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 120px; height: 120px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,168,67,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .earn-lbl { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .earn-amt { font-family: 'Playfair Display', serif; font-size: 52px; color: var(--wheat); line-height: 1; margin-bottom: 8px; }
    .earn-detail { font-size: 13px; color: var(--muted); }
    .dl-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px; border-radius: 13px; border: none;
      background: var(--wheat); color: var(--bg);
      font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
      cursor: pointer; margin-bottom: 24px; transition: background 0.15s, transform 0.1s;
    }
    .dl-btn:hover { background: var(--wheat2); transform: translateY(-1px); }
    .retro-note {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }
    .retro-note strong { color: var(--wheat); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--card2); color: var(--fg);
      padding: 12px 22px; border-radius: 12px;
      border: 1px solid var(--border); font-size: 13px;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 100;
      max-width: calc(100vw - 40px); text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── PRINT ── */
    @media print {
      body { background: #fff; color: #111; font-family: Georgia, serif; }
      .hdr, .tabs, .month-nav, .dl-btn { display: none !important; }
      .screen { padding: 0; max-width: 100%; }
      .earn-card { background: #f7f7f7; border-color: #ddd; break-inside: avoid; }
      .earn-card::before { display: none; }
      .earn-amt { color: #333; font-size: 40px; }
      .earn-lbl, .earn-detail { color: #666; }
      .day-row { background: #f7f7f7; border-color: #ddd; break-inside: avoid; }
      .day-row span { color: #111; }
      .dot { background: #555; }
      .sec-label { color: #666; }
      .retro-note { background: #f7f7f7; border-color: #ddd; color: #555; }
      .print-hdr { display: block !important; }
    }
    .print-hdr { display: none; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #333; }
    .print-hdr h1 { font-size: 26px; margin-bottom: 4px; }
    .print-hdr p  { font-size: 14px; color: #555; }
  </style>
</head>
<body>

<header class="hdr">
  <span class="logo">PaddockPay</span>
  <div class="tabs">
    <button class="tab" id="tab-josh"     onclick="gotoView('josh')">Josh</button>
    <button class="tab" id="tab-calendar" onclick="gotoView('calendar')">Calendar</button>
    <button class="tab" id="tab-janine"   onclick="gotoView('janine')">Janine</button>
  </div>
</header>

<!-- ══ JOSH ══ -->
<div class="screen" id="screen-josh">
  <div class="date-block">
    <div class="date-weekday" id="j-weekday"></div>
    <div class="date-full"    id="j-date"></div>
  </div>
  <div class="day-btns" id="log-btns">
    <button class="big-btn" id="btn-full" onclick="logToday('full')">
      <span class="btn-icon">☀️</span>
      <span class="btn-label">Full Day</span>
      <span class="btn-rate">$350</span>
    </button>
    <button class="big-btn" id="btn-half" onclick="logToday('half')">
      <span class="btn-icon">⛅</span>
      <span class="btn-label">Half Day</span>
      <span class="btn-rate">$175</span>
    </button>
    <button class="big-btn" id="btn-nowork" onclick="logToday('no_work')">
      <span class="btn-icon">🌧️</span>
      <span class="btn-label">No Work</span>
      <span class="btn-rate">$0</span>
    </button>
  </div>
  <div id="logged-state" style="display:none">
    <div class="logged-badge" id="logged-badge"></div>
    <button class="undo-btn" onclick="undoToday()">↩ Undo today's entry</button>
  </div>
  <div class="sec-label">Recent days worked</div>
  <div class="day-list" id="josh-list"><div class="spinner"></div></div>
</div>

<!-- ══ CALENDAR ══ -->
<div class="screen" id="screen-calendar">
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">&#8592;</button>
    <div class="cal-month-lbl" id="cal-month-lbl"></div>
    <button class="cal-nav-btn" id="cal-next-btn" onclick="calNext()">&#8594;</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <p class="cal-hint">Tap any past day to log or remove it</p>
  <div class="cal-legend">
    <div class="cal-legend-item">
      <div class="cal-legend-dot" style="background:var(--wheat)"></div> Full day
    </div>
    <div class="cal-legend-item">
      <div class="cal-legend-dot" style="background:var(--half)"></div> Half day
    </div>
    <div class="cal-legend-item">
      <div class="cal-legend-dot" style="background:var(--border)"></div> No work
    </div>
  </div>
</div>

<!-- ══ JANINE ══ -->
<div class="screen" id="screen-janine">
  <div class="print-hdr">
    <h1>PaddockPay — Work Statement</h1>
    <p id="print-sub"></p>
  </div>
  <div class="month-nav">
    <button class="mnav-btn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="month-lbl"></div>
    <button class="mnav-btn" id="btn-next-month" onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="earn-card">
    <div class="earn-lbl"    id="earn-lbl">Total earned</div>
    <div class="earn-amt"    id="earn-amt">$0</div>
    <div class="earn-detail" id="earn-detail">0 days &times; $350/day</div>
  </div>
  <button class="dl-btn" onclick="window.print()">&#8595;&nbsp; Download / Print Statement</button>

  <!-- XERO SECTION -->
  <div style="margin-bottom:24px">
    <div class="sec-label" style="margin-bottom:10px">Xero Integration</div>
    <div id="xero-status-card" style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:8px;font-size:13px">
      <div id="xero-status-inner">Checking Xero connection...</div>
    </div>
    <div id="invoice-history"></div>
  </div>

  <div id="retro-note-wrap"></div>
  <div class="sec-label">Days worked</div>
  <div class="day-list" id="janine-list"><div class="spinner"></div></div>
</div>

<!-- ══ DAY SHEET ══ -->
<div class="sheet-backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="day-sheet">
  <div class="sheet-title" id="sheet-title"></div>
  <div class="sheet-sub"   id="sheet-sub"></div>
  <div class="sheet-btns" id="sheet-log-btns" style="grid-template-columns: 1fr 1fr 1fr;">
    <button class="sheet-btn" onclick="sheetLog('full')">
      <span class="s-icon">☀️</span>
      <span class="s-label">Full Day</span>
      <span class="s-rate">$350</span>
    </button>
    <button class="sheet-btn" onclick="sheetLog('half')">
      <span class="s-icon">⛅</span>
      <span class="s-label">Half Day</span>
      <span class="s-rate">$175</span>
    </button>
    <button class="sheet-btn" onclick="sheetLog('no_work')">
      <span class="s-icon">🌧️</span>
      <span class="s-label">No Work</span>
      <span class="s-rate">$0</span>
    </button>
  </div>
  <button class="sheet-remove" id="sheet-remove-btn" onclick="sheetRemove()" style="display:none">
    Remove this day
  </button>
  <button class="sheet-cancel" onclick="closeSheet()">Cancel</button>
</div>

<div class="toast" id="toast"></div>

<!-- XERO PIN MODAL -->
<div id="pin-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:40;align-items:flex-end;justify-content:center" onclick="closePinModal(event)">
  <div style="background:var(--card2);border-top:2px solid var(--wheat);border-radius:20px 20px 0 0;padding:24px 20px calc(env(safe-area-inset-bottom)+24px);width:100%;max-width:480px">
    <div style="font-family:'Playfair Display',serif;font-size:18px;margin-bottom:6px;text-align:center">Send Invoice to Xero</div>
    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px" id="pin-month-label"></div>
    <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="Enter 4-digit PIN"
      style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:'DM Mono',monospace;font-size:16px;text-align:center;letter-spacing:4px;margin-bottom:12px">
    <button onclick="submitPin()" style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--wheat);color:var(--bg);font-family:'DM Mono',monospace;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:8px">Send Invoice</button>
    <button onclick="document.getElementById('pin-backdrop').style.display='none'" style="width:100%;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer">Cancel</button>
  </div>
</div>

};
function joke(type) {

// ── INIT ────────────────────────────────────────────────────────────────────
const WRITE_TOKEN = '5e3e316ca7c550ba584fbde3869b129adceba84efd107845';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON, {

  },

let curMonth    = new Date(); curMonth.setDate(1);
let calMonth    = new Date(); calMonth.setDate(1);
let calLogs     = {};   // { 'YYYY-MM-DD': 'full'|'half' }
let sheetDate   = null; // currently open sheet's date

// ── UTILITIES ───────────────────────────────────────────────────────────────
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function fmtDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-AU',
    {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}
function fmtDateLong(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-AU',
    {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}
function fmtMonth(dt) {
  return dt.toLocaleDateString('en-AU', {month:'long', year:'numeric'});
}
function fmtAUD(n) { return '$' + n.toLocaleString('en-AU'); }

function isRetro(row) {
  // Was this entry added after the month it belongs to had already closed?
  const [y,m] = row.date.split('-').map(Number);
  const monthEnd = new Date(y, m, 0, 23, 59, 59); // last moment of that month
  return new Date(row.created_at) > monthEnd;
}

let _toastTimer;
function showToast(msg) {
  clearTimeout(_toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ── ROUTING ─────────────────────────────────────────────────────────────────
function gotoView(view) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-' + view).classList.add('on');
  document.getElementById('screen-' + view).classList.add('on');
  history.replaceState(null, '', '#/' + view);
  if (view === 'josh')     loadJosh();
  if (view === 'calendar') loadCalendar();
  if (view === 'janine')   loadJanine();
}

// ── JOSH ────────────────────────────────────────────────────────────────────
async function loadJosh() {
  const now = new Date();
  document.getElementById('j-weekday').textContent =
    now.toLocaleDateString('en-AU', {weekday:'long'});
  document.getElementById('j-date').textContent =
    now.toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});

  const todayStr = todayISO();
  const { data: todayRow } = await db
    .from('work_logs').select('date, day_type').eq('date', todayStr).maybeSingle();

  const btns   = document.getElementById('log-btns');
  const logged = document.getElementById('logged-state');
  const badge  = document.getElementById('logged-badge');

  if (todayRow) {
    btns.style.display   = 'none';
    logged.style.display = 'block';
    badge.innerHTML = todayRow.day_type === 'half'
      ? '⛅ &nbsp;Half day logged today'
      : todayRow.day_type === 'no_work'
      ? '🌧️ &nbsp;No work logged today'
      : '☀️ &nbsp;Full day logged today';
  } else {
    btns.style.display   = 'grid';
    logged.style.display = 'none';
    document.getElementById('btn-full').disabled = false;
    document.getElementById('btn-half').disabled = false;
  }

  const { data: rows } = await db
    .from('work_logs').select('date, day_type')
    .order('date', {ascending:false}).limit(10);

  const list = document.getElementById('josh-list');
  if (!rows || rows.length === 0) {
    list.innerHTML = '<div class="empty">No days logged yet — tap a button!<br>🐄 The paddock awaits.</div>';
    return;
  }
  list.innerHTML = rows.map(r => {
    const half = r.day_type === 'half';
    return `<div class="day-row">
      <div class="dot" style="${half ? 'opacity:0.4' : ''}"></div>
      <span style="flex:1">${fmtDate(r.date)}</span>
      <span style="font-size:11px;color:var(--muted)">${half ? '½ day' : 'full'}</span>
    </div>`;
  }).join('');
}

async function logToday(type) {
  document.getElementById('btn-full').disabled = true;
  document.getElementById('btn-half').disabled = true;
  document.getElementById('btn-nowork').disabled = true;

  const { error } = await db.from('work_logs').insert({ date: todayISO(), day_type: type });

  if (error) {
    if (error.code === '23505') { showToast(joke('duplicate')); }
    else {
      showToast(joke('error'));
      document.getElementById('btn-full').disabled = false;
      document.getElementById('btn-half').disabled = false;
      return;
    }
  } else {
    showToast(joke(type === 'no_work' ? 'no_work' : type));
  }
  loadJosh();
}

async function undoToday() {
  const { error } = await db.from('work_logs').delete().eq('date', todayISO());
  if (error) { showToast(joke('error')); return; }
  showToast(joke('undo'));
  loadJosh();
}

// ── CALENDAR ────────────────────────────────────────────────────────────────
async function loadCalendar() {
  const y = calMonth.getFullYear();
  const m = calMonth.getMonth();
  const now = new Date();
  const isCurrentMonth = y === now.getFullYear() && m === now.getMonth();

  document.getElementById('cal-month-lbl').textContent = fmtMonth(calMonth);
  document.getElementById('cal-next-btn').disabled = isCurrentMonth;

  // Fetch all logs for this month
  const start = `${y}-${pad(m+1)}-01`;
  const end   = `${y}-${pad(m+1)}-${pad(new Date(y, m+1, 0).getDate())}`;
  const { data: rows } = await db
    .from('work_logs').select('date, day_type')
    .gte('date', start).lte('date', end);

  calLogs = {};
  (rows || []).forEach(r => { calLogs[r.date] = r.day_type; });

  renderCalGrid(y, m, now);
}

function renderCalGrid(y, m, now) {
  const grid = document.getElementById('cal-grid');
  const todayStr = todayISO();

  // Day-of-week headers (Mon first)
  const dows = ['M','T','W','T','F','S','S'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // First day of month, offset for Mon=0 grid
  const firstDay = new Date(y, m, 1);
  const offset = (firstDay.getDay() + 6) % 7; // Mon=0
  const daysInMonth = new Date(y, m+1, 0).getDate();

  // Empty cells before month starts
  for (let i = 0; i < offset; i++) html += `<div class="cal-day cal-empty"></div>`;

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${y}-${pad(m+1)}-${pad(d)}`;
    const dayDate = new Date(y, m, d);
    const isFuture = dayDate > now && iso !== todayStr;
    const isToday  = iso === todayStr;
    const logged   = calLogs[iso];

    let cls = 'cal-day';
    if (isFuture)         cls += ' cal-future';
    if (isToday)          cls += ' cal-today';
    if (logged === 'full')    cls += ' cal-full';
    if (logged === 'half')    cls += ' cal-half';
    if (logged === 'no_work') cls += ' cal-nowork';

    const pip = logged === 'full' ? '☀️' : logged === 'half' ? '⛅' : logged === 'no_work' ? '🌧️' : '';
    const onclick = (!isFuture) ? `onclick="calTap('${iso}', ${!!logged})"` : '';

    html += `<div class="${cls}" ${onclick}>
      <span>${d}</span>
      ${pip ? `<span class="cal-pip">${pip}</span>` : ''}
    </div>`;
  }

  grid.innerHTML = html;
}

function calTap(iso, isLogged) {
  sheetDate = iso;
  const [y,m,d] = iso.split('-').map(Number);
  const label = new Date(y,m-1,d).toLocaleDateString('en-AU',
    {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('sheet-title').textContent = label;

  if (isLogged) {
    const type = calLogs[iso];
    document.getElementById('sheet-sub').textContent =
      type === 'half'    ? 'Currently logged as ⛅ half day' :
      type === 'no_work' ? 'Currently logged as 🌧️ no work' :
                           'Currently logged as ☀️ full day';
    document.getElementById('sheet-log-btns').style.display = 'none';
    document.getElementById('sheet-remove-btn').style.display = 'block';
  } else {
    document.getElementById('sheet-sub').textContent = 'How much of this day was worked?';
    document.getElementById('sheet-log-btns').style.display = 'grid';
    document.getElementById('sheet-remove-btn').style.display = 'none';
  }

  document.getElementById('backdrop').classList.add('on');
  document.getElementById('day-sheet').classList.add('on');
}

async function sheetLog(type) {
  closeSheet();
  const { error } = await db.from('work_logs').insert({ date: sheetDate, day_type: type });
  if (error) {
    if (error.code === '23505') showToast(joke('duplicate'));
    else showToast(joke('error'));
    return;
  }
  showToast(joke(type));
  loadCalendar();
  // Refresh josh list too if it's today
  if (sheetDate === todayISO()) loadJosh();
}

async function sheetRemove() {
  closeSheet();
  const { error } = await db.from('work_logs').delete().eq('date', sheetDate);
  if (error) { showToast(joke('error')); return; }
  showToast(joke('removed'));
  loadCalendar();
  if (sheetDate === todayISO()) loadJosh();
}

function closeSheet() {
  document.getElementById('backdrop').classList.remove('on');
  document.getElementById('day-sheet').classList.remove('on');
}

function calPrev() {
  calMonth.setMonth(calMonth.getMonth() - 1);
  loadCalendar();
}
function calNext() {
  const next = new Date(calMonth);
  next.setMonth(next.getMonth() + 1);
  const now = new Date();
  if (next.getFullYear() > now.getFullYear() ||
     (next.getFullYear() === now.getFullYear() && next.getMonth() > now.getMonth())) return;
  calMonth = next;
  loadCalendar();
}

// ── JANINE ──────────────────────────────────────────────────────────────────
function changeMonth(dir) {
  const next = new Date(curMonth);
  next.setMonth(next.getMonth() + dir);
  const now = new Date();
  if (next.getFullYear() > now.getFullYear() ||
     (next.getFullYear() === now.getFullYear() && next.getMonth() > now.getMonth())) return;
  curMonth = next;
  loadJanine();
}

async function loadJanine() {
  const y = curMonth.getFullYear();
  const m = curMonth.getMonth();

  const label = fmtMonth(curMonth);
  document.getElementById('month-lbl').textContent = label;
  document.getElementById('print-sub').textContent =
    `Josh Pye  ·  ${label}  ·  Rate: $${DAY_RATE}/day`;

  const start = `${y}-${pad(m+1)}-01`;
  const end   = `${y}-${pad(m+1)}-${pad(new Date(y, m+1, 0).getDate())}`;

  loadXeroStatus();
  loadInvoiceHistory();
  document.getElementById('janine-list').innerHTML = '<div class="spinner"></div>';

  const { data: rows, error } = await db
    .from('work_logs').select('date, day_type, created_at')
    .gte('date', start).lte('date', end)
    .order('date', {ascending: true});

  if (error) { showToast("The shed door's stuck — try again 🚪"); return; }

  const now = new Date();
  const isNow = y === now.getFullYear() && m === now.getMonth();

  // Disable → on current month
  document.getElementById('btn-next-month').style.opacity = isNow ? '0.3' : '1';
  document.getElementById('btn-next-month').style.pointerEvents = isNow ? 'none' : 'auto';

  const fullDays = rows.filter(r => r.day_type !== 'half' && r.day_type !== 'no_work').length;
  const halfDays = rows.filter(r => r.day_type === 'half').length;
  const earned   = fullDays * DAY_RATE + halfDays * (DAY_RATE / 2);

  document.getElementById('earn-lbl').textContent =
    isNow ? 'Earned so far this month' : 'Total earned this month';
  document.getElementById('earn-amt').textContent = fmtAUD(earned);

  let detail = '';
  if (fullDays > 0 && halfDays > 0)
    detail = `${fullDays} full + ${halfDays} half = ${fullDays + halfDays*0.5} days × $${DAY_RATE}`;
  else if (halfDays > 0)
    detail = `${halfDays} half day${halfDays !== 1 ? 's' : ''} × $${DAY_RATE/2}`;
  else
    detail = `${fullDays} day${fullDays !== 1 ? 's' : ''} × $${DAY_RATE}/day`;
  document.getElementById('earn-detail').textContent = detail;

  // Retrospective entries
  const retroRows = rows.filter(isRetro);
  const noteWrap  = document.getElementById('retro-note-wrap');
  if (retroRows.length > 0 && !isNow) {
    const dates = retroRows.map(r => {
      const when = new Date(r.created_at).toLocaleDateString('en-AU', {day:'numeric', month:'short', year:'numeric'});
      return `added ${when}`;
    });
    const unique = [...new Set(dates)];
    noteWrap.innerHTML = `<div class="retro-note">
      <strong>✏ Statement updated after month closed</strong><br>
      ${retroRows.length} entr${retroRows.length > 1 ? 'ies were' : 'y was'} added retrospectively (${unique.join(', ')}).
    </div>`;
  } else {
    noteWrap.innerHTML = '';
  }

  const list = document.getElementById('janine-list');
  if (rows.length === 0) {
    list.innerHTML = '<div class="empty">No days worked this month.</div>';
    return;
  }

  list.innerHTML = rows.map(r => {
    const half  = r.day_type === 'half';
    const retro = isRetro(r);
    const noWork = r.day_type === 'no_work';
    return `<div class="day-row">
      <div class="dot" style="${half || noWork ? 'opacity:0.4' : ''}"></div>
      <span style="flex:1">${retro ? '✏ ' : ''}${fmtDate(r.date)}</span>
      <span style="font-size:11px;color:var(--muted);background:var(--card2);padding:3px 8px;border-radius:6px">
        ${noWork ? 'no work' : half ? '½ day' : 'full day'}
      </span>
    </div>`;
  }).join('');
}

// ── XERO ─────────────────────────────────────────────────────────────────────
const SUPABASE_FUNCTIONS = 'https://qfuffybirntwooanvtte.supabase.co/functions/v1';
const ANON_KEY = SUPABASE_ANON;
const MONTH_NAMES_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_NAMES_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

async function loadXeroStatus() {
  const inner = document.getElementById('xero-status-inner');
  if (!inner) return;

  const hashParams = new URLSearchParams((window.location.hash.split('?')[1] || ''));
  const xeroParam = hashParams.get('xero');
  if (xeroParam === 'connected') {
    showToast('✓ Xero connected successfully! 🎉');
    history.replaceState(null, '', '#/janine');
  } else if (xeroParam === 'error') {
    showToast('Xero connection failed — please try again');
    history.replaceState(null, '', '#/janine');
  }

  try {
    const { data, error } = await db
      .from('xero_config')
      .select('org_name, updated_at')
      .eq('id', 1)
      .maybeSingle();

    if (error || !data || !data.org_name) {
      inner.innerHTML = `
        <div style="color:var(--muted);margin-bottom:12px">Not connected to Xero</div>
        <button onclick="connectXero()" style="width:100%;padding:12px;border-radius:10px;border:2px solid var(--wheat);background:transparent;color:var(--wheat);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer">
          Connect Xero →
        </button>`;
    } else {
      const when = new Date(data.updated_at).toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'});
      const prev = new Date(); prev.setMonth(prev.getMonth() - 1);
      const prevMonth = MONTH_NAMES_FULL[prev.getMonth()];
      const prevYear = prev.getFullYear();
      inner.innerHTML = `
        <div style="color:var(--green);margin-bottom:4px">✓ Connected to ${data.org_name}</div>
        <div style="color:var(--muted);font-size:11px;margin-bottom:14px">Last synced ${when}</div>
        <button onclick="openPinModal('${prevMonth}', ${prevYear})" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--wheat);background:transparent;color:var(--wheat);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;margin-bottom:8px">
          ↑ Send invoice for ${prevMonth} ${prevYear}
        </button>
        <button onclick="disconnectXero()" style="width:100%;padding:8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">
          Disconnect Xero
        </button>`;
    }
  } catch(e) {
    inner.innerHTML = `<span style="color:var(--red)">Error checking Xero status — check connection</span>`;
  }
}

function connectXero() {
  const params = new URLSearchParams({
    response_type: 'code',
    client_id: '2DA6D7806B7E46BD866B588157365702',
    redirect_uri: 'https://qfuffybirntwooanvtte.supabase.co/functions/v1/xero-callback',
    scope: 'openid profile email accounting.transactions accounting.contacts offline_access',
    state: crypto.randomUUID()
  });
  window.location.href = 'https://login.xero.com/identity/connect/authorize?' + params.toString();
}

async function disconnectXero() {
  if (!confirm('Disconnect Xero? Invoice history is kept. You can reconnect at any time.')) return;
  await db.from('xero_config').delete().eq('id', 1);
  loadXeroStatus();
  showToast('Xero disconnected');
}

let _pinMonth = '';
let _pinYear = 0;

function openPinModal(month, year) {
  _pinMonth = month;
  _pinYear = year;
  document.getElementById('pin-month-label').textContent = `${month} ${year} — Josh Pye`;
  document.getElementById('pin-input').value = '';
  const bd = document.getElementById('pin-backdrop');
  bd.style.display = 'flex';
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
}

function closePinModal(e) {
  if (e.target === document.getElementById('pin-backdrop')) {
    document.getElementById('pin-backdrop').style.display = 'none';
  }
}

async function submitPin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (pin.length !== 4) { showToast('Enter your 4-digit PIN'); return; }
  document.getElementById('pin-backdrop').style.display = 'none';

  const monthNum = MONTH_NAMES_FULL.indexOf(_pinMonth) + 1;
  showToast('Sending invoice to Xero... 🚜');

  try {
    const res = await fetch(`${SUPABASE_FUNCTIONS}/trigger-invoice`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${ANON_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ pin, month: monthNum, year: _pinYear })
    });

    const result = await res.json();

    if (result.success) {
      showToast(`✓ Invoice ${result.invoiceNumber} created! $${Number(result.totalAmount).toLocaleString('en-AU')}`);
      loadInvoiceHistory();
    } else if (result.error === 'Invalid PIN') {
      showToast('Incorrect PIN — try again');
    } else if (result.alreadyExists) {
      showToast(`Invoice already exists: ${result.message}`);
    } else {
      showToast(result.message || result.error || 'Invoice failed — check Xero connection');
    }
  } catch(e) {
    showToast('Failed to reach server — check internet connection');
  }
}

async function loadInvoiceHistory() {
  const wrap = document.getElementById('invoice-history');
  if (!wrap) return;

  const { data: invoices } = await db
    .from('invoice_log')
    .select('month, year, total_days, total_amount, xero_invoice_number, xero_invoice_url, status, triggered_by, created_at')
    .order('year', { ascending: false })
    .order('month', { ascending: false })
    .limit(12);

  if (!invoices || invoices.length === 0) { wrap.innerHTML = ''; return; }

  wrap.innerHTML = '<div class="sec-label" style="margin-bottom:8px">Invoice History</div>' +
    invoices.map(inv => `
      <div style="display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:6px">
        <div style="flex:1">
          <div style="font-size:13px">${MONTH_NAMES_SHORT[inv.month-1]} ${inv.year}
            <span style="font-size:10px;color:var(--muted);margin-left:6px">${inv.triggered_by === 'manual' ? '(manual)' : ''}</span>
          </div>
          <div style="font-size:11px;color:var(--muted)">${inv.total_days} days · $${Number(inv.total_amount).toLocaleString('en-AU',{minimumFractionDigits:2})}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          ${inv.status === 'failed'
            ? '<span style="font-size:11px;color:var(--red);background:rgba(139,58,42,0.15);padding:2px 8px;border-radius:6px">Failed</span>'
            : `<span style="font-size:11px;color:var(--muted);background:var(--card2);padding:2px 8px;border-radius:6px">${inv.xero_invoice_number || 'DRAFT'}</span>`
          }
          ${inv.xero_invoice_url
            ? `<a href="${inv.xero_invoice_url}" target="_blank" style="font-size:11px;color:var(--wheat);text-decoration:none">View in Xero →</a>`
            : ''
          }
        </div>
      </div>`
    ).join('');
}
